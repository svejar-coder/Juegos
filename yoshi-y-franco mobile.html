<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Yoshi y Franco — La Gran Aventura</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body {
    height:100%; overflow:hidden;
    background:
      radial-gradient(circle at 20% 12%, rgba(255,246,195,.9), transparent 26%),
      linear-gradient(145deg,#14304f 0%, #264d6e 44%, #7ec8e3 100%);
    font-family:'Trebuchet MS','Comic Sans MS','Chalkboard SE','Segoe UI',sans-serif;
    overscroll-behavior:none;
    -webkit-user-select:none; user-select:none;
    -webkit-tap-highlight-color:transparent;
    -webkit-touch-callout:none;
    position:fixed; width:100%;
  }
  #wrap {
    position:relative; width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(circle at 80% 18%, rgba(255,226,122,.42), transparent 22%),
      radial-gradient(circle at 15% 82%, rgba(92,201,255,.28), transparent 28%);
  }
  canvas {
    display:block; width:100%; height:100%; touch-action:none;
    image-rendering:auto;
    filter:saturate(1.1) contrast(1.03);
  }
  #rotate {
    position:absolute; inset:0; z-index:20;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:
      radial-gradient(circle at 50% 20%, rgba(255,230,140,.22), transparent 24%),
      linear-gradient(160deg,#17283f,#315f76 58%,#78c9e8);
    color:#fff; text-align:center; padding:24px; gap:18px;
  }
  #rotate .phone {
    font-size:76px; animation:spinPhone 1.6s ease-in-out infinite;
    filter:drop-shadow(0 10px 18px rgba(0,0,0,.35));
  }
  @keyframes spinPhone { 0%,20%{transform:rotate(0)} 55%,100%{transform:rotate(90deg)} }
  #rotate p { font-size:clamp(18px,5vw,28px); line-height:1.35; text-shadow:0 3px 0 rgba(0,0,0,.22); }
  #overlay {
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:
      radial-gradient(circle at 20% 18%, rgba(255,255,255,.8), transparent 24%),
      radial-gradient(circle at 80% 20%, rgba(255,226,122,.55), transparent 22%),
      linear-gradient(160deg, rgba(109,211,255,.96), rgba(250,244,180,.96) 52%, rgba(140,222,125,.96));
    z-index:10; text-align:center;
    padding:22px; gap:10px;
    overflow-y:auto; -webkit-overflow-scrolling:touch;
  }
  #overlay:before {
    content:""; position:absolute; inset:18px;
    border:5px solid rgba(255,255,255,.55);
    border-radius:34px;
    box-shadow: inset 0 0 0 3px rgba(24,48,74,.18), 0 24px 80px rgba(10,42,68,.2);
    pointer-events:none;
  }
  #overlay h1 {
    position:relative;
    font-size:clamp(34px,8vw,82px); color:#fff;
    line-height:.92; letter-spacing:-2px;
    text-shadow:0 6px 0 #e8974a, 0 11px 20px rgba(30,70,80,.28);
    margin:0 0 6px 0;
  }
  #overlay p {
    position:relative;
    font-size:clamp(14px,2.2vw,21px); color:#26465b;
    margin:0; max-width:760px; line-height:1.42; font-weight:800;
    background:rgba(255,255,255,.52);
    border:2px solid rgba(255,255,255,.72);
    border-radius:20px;
    padding:10px 16px;
    box-shadow:0 8px 24px rgba(40,80,100,.12);
  }
  .bigbtn {
    position:relative;
    font-family:inherit; font-size:clamp(22px,3.8vw,34px); padding:15px 46px;
    border:4px solid #fff; border-radius:999px;
    background:linear-gradient(180deg,#ffcf58 0%,#ff9f3d 52%,#e87930 100%);
    color:#fff; cursor:pointer;
    text-shadow:0 3px 0 rgba(153,80,30,.55);
    box-shadow:0 9px 0 #b65e25,0 18px 34px rgba(30,60,80,.35), inset 0 4px 0 rgba(255,255,255,.35);
    transition:transform .1s, box-shadow .1s;
    margin:8px 0 10px; flex-shrink:0;
  }
  .bigbtn:active { transform:translateY(6px); box-shadow:0 3px 0 #b65e25,0 10px 18px rgba(30,60,80,.28), inset 0 4px 0 rgba(255,255,255,.25); }
  #shibaPreview {
    position:relative;
    font-size:clamp(56px,12vw,118px); margin:0 0 2px;
    animation:bounce 1.05s infinite;
    filter:drop-shadow(0 18px 14px rgba(30,60,70,.26));
  }
  @keyframes bounce { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-18px) scale(1.04)} }
  .hidden { display:none !important; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <div id="rotate" class="hidden">
    <div class="phone">📱</div>
    <p><b>¡Gira el teléfono!</b><br>Este juego se juega con el teléfono acostado 🐕💨</p>
  </div>
  <div id="overlay">
    <div id="shibaPreview">🐕</div>
    <h1>¡Yoshi y Franco!</h1>
    <button class="bigbtn" id="startBtn">▶ ¡A jugar!</button>
    <p><b>Toca la pantalla</b> para saltar (o dar el combo 💪).<br>
    Mantén apretado para saltar más alto.</p>
    <p style="opacity:.85"><b>5 etapas:</b> Yoshi corre 🐾 · Paseo con correa 💦 · Franco en moto 🏍️ · ¡El súper combo! 💪 · Papá y Franco a la meta 🏆</p>
  </div>
</div>
<script>
(() => {
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// polyfill de roundRect para navegadores antiguos (iOS < 16)
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = [r, r, r, r];
    else if (Array.isArray(r)) { while (r.length < 4) r.push(r[r.length-1] || 0); }
    else r = [0,0,0,0];
    this.moveTo(x + r[0], y);
    this.lineTo(x + w - r[1], y);
    this.arcTo(x + w, y, x + w, y + r[1], r[1]);
    this.lineTo(x + w, y + h - r[2]);
    this.arcTo(x + w, y + h, x + w - r[2], y + h, r[2]);
    this.lineTo(x + r[3], y + h);
    this.arcTo(x, y + h, x, y + h - r[3], r[3]);
    this.lineTo(x, y + r[0]);
    this.arcTo(x, y, x + r[0], y, r[0]);
    this.closePath();
    return this;
  };
}

const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const rotateEl = document.getElementById('rotate');

const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
let portraitBlocked = false;

let W = 900, H = 500, dpr = 1;
function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  // en teléfonos en vertical, pedir que giren (el juego es horizontal)
  portraitBlocked = isTouchDevice && H > W && W < 820;
  rotateEl.classList.toggle('hidden', !portraitBlocked);
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 250));
if (window.visualViewport) window.visualViewport.addEventListener('resize', resize);
resize();

// bloquear scroll, rebote y pull-to-refresh en móvil — excepto dentro del overlay de inicio
document.addEventListener('touchmove', e => {
  if (overlay && !overlay.classList.contains('hidden') && overlay.contains(e.target)) return;
  e.preventDefault();
}, { passive:false });
document.addEventListener('gesturestart', e => e.preventDefault());
canvas.addEventListener('contextmenu', e => e.preventDefault());

// ---------- Audio ----------
let AC = null;
function audio() { if (!AC) { try { AC = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){} } return AC; }
function blip(freq, dur, type='sine', vol=0.15, when=0) {
  const ac = audio(); if (!ac) return;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, ac.currentTime + when);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + when + dur);
  o.connect(g); g.connect(ac.destination);
  o.start(ac.currentTime + when); o.stop(ac.currentTime + when + dur + 0.05);
}
const sndJump  = () => { blip(420,.12,'square',.08); blip(640,.12,'square',.06,.05); };
const sndBone  = () => { blip(880,.1,'sine',.12); blip(1320,.15,'sine',.1,.07); };
const sndBump  = () => blip(160,.18,'triangle',.12);
const sndWin   = () => { [523,659,784,1047,784,1047].forEach((f,i)=>blip(f,.22,'sine',.12,i*.16)); };
const sndChirp = () => { blip(1900,.06,'sine',.08); blip(2300,.06,'sine',.07,.08); blip(2100,.05,'sine',.06,.16); };
const sndBark  = () => { blip(220,.08,'sawtooth',.09); blip(180,.1,'sawtooth',.08,.12); };
const sndSplash= () => { blip(320,.08,'triangle',.12); blip(140,.2,'sine',.12,.05); blip(500,.06,'sine',.06,.1); };
const sndStage = () => { [660,880,990].forEach((f,i)=>blip(f,.18,'sine',.1,i*.12)); };
const sndMoto  = () => { blip(90,.3,'sawtooth',.05); blip(120,.3,'sawtooth',.04,.1); };
const sndPunch = () => { blip(100,.1,'square',.16); blip(700,.05,'square',.08,.02); };
const sndBoing = () => { blip(500,.08,'sine',.1); blip(300,.12,'sine',.09,.07); blip(200,.15,'sine',.08,.15); };
const sndTrophy= () => { [523,659,784,1047,1319,1568].forEach((f,i)=>blip(f,.25,'sine',.12,i*.14)); };

// ---------- Config de etapas ----------
const STAGES = {
  1: { dur:30, speedMul:1.00, mode:'jump',  dogs:true,  puddles:false, water:false, title:'Etapa 1', sub:'¡Yoshi corre hacia Franco!', goal:'🧒', marker:'🐾' },
  2: { dur:30, speedMul:1.05, mode:'jump',  dogs:true,  puddles:true,  water:false, title:'Etapa 2', sub:'Paseo con correa 🐕 ¡Ojo con las pozas!', goal:'🌳', marker:'🐾' },
  3: { dur:30, speedMul:1.45, mode:'jump',  dogs:false, puddles:true,  water:false, title:'Etapa 3', sub:'¡Franco en moto y Yoshi a toda carrera!', goal:'🏁', marker:'🏍️' },
  4: { dur:30, speedMul:0.95, mode:'punch', dogs:false, puddles:false, water:false, title:'Etapa 4', sub:'¡Franco protege a mamá Jackie! Toca para el súper combo 💪', goal:'🤰', marker:'💪' },
  5: { dur:30, speedMul:1.50, mode:'jump',  dogs:false, puddles:false, water:true,  title:'Etapa 5', sub:'¡Papá y Franco en moto por los cerros! ¡Salten el agua! 🏍️🏍️', goal:'🏆', marker:'🏍️' }
};

// ---------- Estado ----------
let state = 'menu'; // menu | card | run | arrive | meet | finish | party
let stage = 1;
let t = 0, last = 0, stateT = 0;
let player, obstacles, bones, clouds, hills, trees, particles, hearts, splashTexts, powTexts;
let dogs, birds, nextDog, nextBird;
let bonesCount, speed, nextObs, nextBone, runPhase, francoX, flagX, partyT, bumpFlash, ouchT;
let scrollX = 0;

function groundLevel(){ return H - Math.max(70, H*0.16); }
function baseSpeed(){ return Math.min(W,900) * 0.42; }

// terreno: plano en etapas 1-4, cerros ondulados en la 5
function terrainAt(x) {
  const base = groundLevel();
  if (stage === 5) {
    const wx = scrollX + x;
    const h = Math.sin(wx*0.006)*0.6 + Math.sin(wx*0.0113 + 2)*0.4; // -1..1
    return base - (h*0.5 + 0.5) * Math.max(42, H*0.10);
  }
  return base;
}
function terrainSlope(x) {
  return Math.atan2(terrainAt(x+14) - terrainAt(x-14), 28);
}

function resetWorldDeco() {
  clouds = Array.from({length:6}, () => ({ x: Math.random()*W, y: H*0.08 + Math.random()*H*0.22, s: 0.6+Math.random()*0.8 }));
  hills  = Array.from({length:4}, (_,i) => ({ x: i*(W/2.5), w: W*0.5+Math.random()*W*0.2, h: H*0.12+Math.random()*H*0.08 }));
  trees  = Array.from({length:5}, (_,i) => ({ x: i*(W/3.2)+Math.random()*80, s: 0.8+Math.random()*0.5 }));
}

function beginStage(n) {
  stage = n;
  const cfg = STAGES[n];
  t = 0;
  scrollX = 0;
  speed = baseSpeed() * cfg.speedMul;
  const px = n === 1 ? Math.max(90, W*0.14) : n === 4 ? Math.max(200, W*0.28) : Math.max(170, W*0.25);
  player = { x: px, y: terrainAt(px), vy: 0, onGround: true, jumpHeld:false, punchT: 0 };
  obstacles = []; bones = []; dogs = []; birds = []; splashTexts = []; powTexts = [];
  nextObs = 2.2; nextBone = 1.2;
  nextDog = 6 + Math.random()*4; nextBird = 3.5;
  runPhase = 0; bumpFlash = 0; ouchT = 0;
  state = 'run';
  if (n === 3 || n === 5) sndMoto();
}

function showCard(n) {
  stage = n; state = 'card'; stateT = 0; sndStage();
}

function fullReset() {
  bonesCount = 0;
  particles = []; hearts = [];
  obstacles = []; bones = []; dogs = []; birds = []; splashTexts = []; powTexts = [];
  runPhase = 0; bumpFlash = 0; ouchT = 0; scrollX = 0;
  resetWorldDeco();
  showCard(1);
}

// ---------- Input ----------
let lastActionTs = 0;
function action() {
  const now = Date.now();
  if (now - lastActionTs < 60) return; // evita doble disparo (touch + pointer del mismo toque)
  lastActionTs = now;
  const ac = audio(); if (ac && ac.state === 'suspended') ac.resume();
  if (state === 'run') {
    if (STAGES[stage].mode === 'punch') {
      doPunch();
    } else if (player.onGround) {
      player.vy = -Math.max(H*1.25, 600);
      player.onGround = false;
      player.jumpHeld = true;
      sndJump();
    }
  } else if (state === 'card' && stateT > 0.8) {
    beginStage(stage);
  } else if (state === 'party' && partyT > 2.5) {
    fullReset();
  }
}
function releaseJump() { if (player) player.jumpHeld = false; }
window.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    if (!e.repeat) action();
  }
});
window.addEventListener('keyup', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') releaseJump();
});
canvas.addEventListener('pointerdown', action);
canvas.addEventListener('pointerup', releaseJump);
canvas.addEventListener('pointercancel', releaseJump);
canvas.addEventListener('pointerleave', releaseJump);
// respaldo con eventos táctiles nativos para iOS (algunos Safari no emiten pointer events fiables en canvas)
canvas.addEventListener('touchstart', e => { e.preventDefault(); action(); }, { passive:false });
canvas.addEventListener('touchend', e => { e.preventDefault(); releaseJump(); }, { passive:false });
canvas.addEventListener('touchcancel', releaseJump);
function startGameFromMenu(e) {
  if (e) { e.preventDefault(); e.stopPropagation(); }
  if (state !== 'menu') return;
  audio();
  if (isTouchDevice) {
    const el = document.documentElement;
    const fs = el.requestFullscreen || el.webkitRequestFullscreen;
    if (fs) { try { const p = fs.call(el); if (p && p.catch) p.catch(()=>{}); } catch(err){} }
    if (screen.orientation && screen.orientation.lock) {
      try { screen.orientation.lock('landscape').catch(()=>{}); } catch(err){}
    }
  }
  overlay.classList.add('hidden');
  fullReset();
}
// registrar en el botón Y en todo el overlay, con touchend y click (iOS a veces pierde uno u otro)
['click','touchend','pointerdown'].forEach(ev => {
  startBtn.addEventListener(ev, startGameFromMenu, { passive:false });
  overlay.addEventListener(ev, startGameFromMenu, { passive:false });
});

// ---------- Combo de Franco (etapa 4) ----------
function doPunch() {
  if (player.punchT > 0) return;
  player.punchT = 0.35;
  sndPunch();
  const zoneA = player.x + 20, zoneB = player.x + 160;
  let hitSomething = false;
  const cols = { rock:'#8a8a92', bush:'#4a8a3a', log:'#8a5a3a', box:'#c9a86b' };
  obstacles.forEach(o => {
    if (o.type === 'puddle' || o.type === 'water' || o.dead) return;
    if (o.x + o.w/2 > zoneA && o.x - o.w/2 < zoneB) {
      o.dead = true; hitSomething = true;
      spawnParticleBurst(o.x, terrainAt(o.x) - o.h/2, cols[o.type] || '#8a8a92', 16);
      powTexts.push({ x: o.x, y: terrainAt(o.x) - o.h - 30, t: 0 });
      if (o.type === 'box') sndBoing();
    }
  });
  obstacles = obstacles.filter(o => !o.dead);
  if (hitSomething) spawnParticleBurst(player.x + 90, terrainAt(player.x) - 50, '#ffd24a', 8);
}

// ---------- Dibujo: Yoshi ----------
function furEllipse(cx, cy, rx, ry, rot, base, light, shadow) {
  const g = ctx.createRadialGradient(cx-rx*.25, cy-ry*.45, 2, cx, cy, Math.max(rx,ry)*1.35);
  g.addColorStop(0, light);
  g.addColorStop(.48, base);
  g.addColorStop(1, shadow);
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.ellipse(cx, cy, rx, ry, rot, 0, Math.PI*2);
  ctx.fill();
}
function furStroke(x1,y1,x2,y2,color,w) {
  ctx.strokeStyle = color;
  ctx.lineWidth = w;
  ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
}
function drawYoshi(x, y, phase, airborne, happy, collar) {
  // Shiba Inu más reconocible: cuerpo compacto, cara triangular, pecho blanco, cola enroscada.
  ctx.save();
  ctx.translate(x, y);
  const bob = airborne ? -2 : Math.sin(phase*18)*2.2;
  ctx.translate(0, bob);
  const run = phase*18;
  const shiba = '#c97931', shiba2 = '#e99a4a', shibaDark = '#7a3f1f';
  const cream = '#fff0dc', cream2 = '#e8c7a3', ink = '#24180f';

  // sombra elíptica adherida al suelo
  ctx.save();
  ctx.globalAlpha = airborne ? .18 : .38;
  ctx.fillStyle = '#0e2215';
  ctx.beginPath(); ctx.ellipse(-4, 5, 54, 8, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // cola enroscada clásica de Shiba, arriba y sobre el lomo
  ctx.save();
  ctx.translate(-42, -55);
  ctx.rotate(-0.15 + Math.sin(run*.45)*0.08);
  ctx.strokeStyle = shibaDark;
  ctx.lineWidth = 17;
  ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(0, 0, 21, Math.PI*.10, Math.PI*1.95, false); ctx.stroke();
  ctx.strokeStyle = shiba2;
  ctx.lineWidth = 12;
  ctx.beginPath(); ctx.arc(0, 0, 19, Math.PI*.12, Math.PI*1.88, false); ctx.stroke();
  ctx.strokeStyle = cream;
  ctx.lineWidth = 4;
  ctx.beginPath(); ctx.arc(2, 1, 12, Math.PI*.25, Math.PI*1.35, false); ctx.stroke();
  ctx.restore();

  // patas: cortas, firmes, con calcetines blancos; se mueven sin romper la silueta
  const paws = [-28,-10,11,28];
  paws.forEach((px,i)=>{
    const a = airborne ? (i%2?-0.55:.55) : Math.sin(run + i*Math.PI*.85)*0.45;
    const kneeX = px + Math.sin(a)*7;
    const pawX = px + Math.sin(a)*16;
    ctx.strokeStyle = i < 2 ? shibaDark : shiba;
    ctx.lineWidth = 9;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(px, -28);
    ctx.quadraticCurveTo(kneeX, -15, pawX, -3);
    ctx.stroke();
    ctx.fillStyle = cream;
    ctx.beginPath(); ctx.ellipse(pawX+2, -1, 8, 4.2, 0, 0, Math.PI*2); ctx.fill();
  });

  // cuerpo compacto con degradado lateral
  const bodyGrad = ctx.createLinearGradient(-45,-64,45,-22);
  bodyGrad.addColorStop(0, shibaDark);
  bodyGrad.addColorStop(.35, shiba);
  bodyGrad.addColorStop(1, shiba2);
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.ellipse(-4, -39, 42, 23, -0.03, 0, Math.PI*2);
  ctx.fill();

  // lomo más oscuro
  ctx.fillStyle = 'rgba(79,39,18,.35)';
  ctx.beginPath(); ctx.ellipse(-10, -51, 30, 8, -0.05, 0, Math.PI*2); ctx.fill();

  // pecho y vientre blanco, rasgo clave del Shiba
  ctx.fillStyle = cream;
  ctx.beginPath();
  ctx.ellipse(9, -34, 23, 14, .12, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = cream2;
  ctx.globalAlpha=.35;
  ctx.beginPath(); ctx.ellipse(16, -31, 13, 7, .1, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;

  // cuello blanco
  ctx.fillStyle = cream;
  ctx.beginPath(); ctx.ellipse(26, -52, 15, 14, -0.5, 0, Math.PI*2); ctx.fill();

  // cabeza tipo zorro/Shiba: mejillas, hocico y orejas triangulares
  ctx.save();
  ctx.translate(38, -61);
  ctx.rotate(Math.sin(run*.35)*0.035);

  // orejas triangulares
  ctx.fillStyle = shibaDark;
  ctx.beginPath(); ctx.moveTo(-15,-9); ctx.lineTo(-10,-37); ctx.lineTo(2,-13); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(10,-12); ctx.lineTo(20,-39); ctx.lineTo(25,-8); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#f3c99f';
  ctx.beginPath(); ctx.moveTo(-10,-13); ctx.lineTo(-8,-28); ctx.lineTo(-1,-12); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(14,-14); ctx.lineTo(19,-29); ctx.lineTo(22,-12); ctx.closePath(); ctx.fill();

  const headGrad = ctx.createRadialGradient(7,-9,5,6,-4,33);
  headGrad.addColorStop(0, shiba2);
  headGrad.addColorStop(.62, shiba);
  headGrad.addColorStop(1, shibaDark);
  ctx.fillStyle = headGrad;
  ctx.beginPath(); ctx.ellipse(4, -5, 27, 24, .08, 0, Math.PI*2); ctx.fill();

  // máscara blanca: hocico y mejillas

    ctx.fillStyle = rim; ctx.beginPath(); ctx.arc(wx, wy, wheelR*.43, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = accent; ctx.beginPath(); ctx.arc(wx, wy, wheelR*.18, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle='#788797'; ctx.lineWidth=2;
    for (let i=0;i<6;i++){ const a=phase*9+i*Math.PI/3; ctx.beginPath(); ctx.moveTo(wx,wy); ctx.lineTo(wx+Math.cos(a)*wheelR*.38,wy+Math.sin(a)*wheelR*.38); ctx.stroke(); }
  });

  // suspensión delantera doble
  ctx.strokeStyle=metal; ctx.lineWidth=6; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(42,-23); ctx.lineTo(51,-68); ctx.stroke();
  ctx.strokeStyle='#eef2f6'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(36,-24); ctx.lineTo(45,-66); ctx.stroke();

  ctx.strokeStyle=metal; ctx.lineWidth=6; ctx.beginPath(); ctx.moveTo(-42,-23); ctx.lineTo(-12,-42); ctx.stroke();
  ctx.strokeStyle='#575f6b'; ctx.lineWidth=6; ctx.beginPath(); ctx.moveTo(-5,-38); ctx.quadraticCurveTo(-30,-50,-48,-42); ctx.stroke();

  // carrocería con tanque y tapas
  const g = ctx.createLinearGradient(-42,-68,48,-25);
  g.addColorStop(0,light); g.addColorStop(.45,body); g.addColorStop(1,accent);
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.moveTo(-43,-35); ctx.lineTo(-17,-61); ctx.lineTo(24,-64); ctx.lineTo(46,-40); ctx.lineTo(31,-28); ctx.lineTo(-32,-27); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#f5f7fb'; ctx.beginPath(); ctx.roundRect(-14,-57,27,18,4); ctx.fill();
  ctx.fillStyle=accent; ctx.font='bold 12px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('25',0,-48);
  ctx.fillStyle=body;
  ctx.beginPath(); ctx.moveTo(28,-55); ctx.quadraticCurveTo(60,-64,68,-48); ctx.lineTo(60,-42); ctx.quadraticCurveTo(50,-53,29,-47); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#252833'; ctx.beginPath(); ctx.roundRect(-33,-68,39,10,4); ctx.fill();
  ctx.strokeStyle=accent; ctx.lineWidth=6; ctx.beginPath(); ctx.moveTo(48,-68); ctx.lineTo(65,-78); ctx.stroke();
  ctx.strokeStyle='#1a1a20'; ctx.lineWidth=6; ctx.beginPath(); ctx.moveTo(61,-79); ctx.lineTo(76,-77); ctx.stroke();

  if (rider) {
    // papá montado, más robusto
    ctx.strokeStyle='#454b55'; ctx.lineWidth=10; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-13,-72); ctx.lineTo(0,-48); ctx.lineTo(0,-29); ctx.stroke();
    ctx.fillStyle='#222'; ctx.beginPath(); ctx.ellipse(3,-27,8,4.5,0,0,Math.PI*2); ctx.fill();
    ctx.save(); ctx.translate(-13,-74); ctx.rotate(.32);
    const jg=ctx.createLinearGradient(-16,-42,16,2); jg.addColorStop(0,'#626978'); jg.addColorStop(1,jersey);
    ctx.fillStyle=jg; ctx.beginPath(); ctx.roundRect(-15,-40,30,42,10); ctx.fill();
    ctx.fillStyle=body; ctx.beginPath(); ctx.roundRect(-15,-22,30,8,3); ctx.fill();
    ctx.restore();
    ctx.strokeStyle=jersey; ctx.lineWidth=9; ctx.beginPath(); ctx.moveTo(-4,-100); ctx.lineTo(31,-83); ctx.lineTo(71,-77); ctx.stroke();
    ctx.fillStyle=skin; ctx.beginPath(); ctx.arc(71,-77,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=skin; ctx.beginPath(); ctx.ellipse(0,-112,16,17,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=body; ctx.beginPath(); ctx.arc(0,-116,17,Math.PI*.8,Math.PI*2.15); ctx.fill();
    ctx.fillStyle=accent; ctx.beginPath(); ctx.roundRect(8,-126,20,5,2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.globalAlpha=.25; ctx.beginPath(); ctx.ellipse(-4,-121,5,3,-.3,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
    ctx.fillStyle='#2b1b12'; ctx.beginPath(); ctx.arc(7,-112,2.3,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#2b1b12'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(5,-105,5,0.15,Math.PI*.75); ctx.stroke();
    ctx.fillStyle='rgba(70,42,24,.45)'; ctx.beginPath(); ctx.arc(3,-103,8,0.05,Math.PI*.85); ctx.fill();

}

// ---------- Dibujo: papá de pie (fiesta final) ----------
function drawPapaStand(x, y, phase) {
  ctx.save();
  ctx.translate(x, y);
  const skin = '#e8b88a', jersey = '#3a3f4a', body = '#2d6fd1';
  // piernas
  ctx.strokeStyle = '#4a4f5a'; ctx.lineWidth = 10; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-5,-44); ctx.lineTo(-7,-6); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(5,-44); ctx.lineTo(7,-6); ctx.stroke();
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.ellipse(-9,-4,8,4,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(9,-4,8,4,0,0,Math.PI*2); ctx.fill();
  // cuerpo
  ctx.fillStyle = jersey;
  ctx.beginPath(); ctx.roundRect(-15,-82,30,40,9); ctx.fill();
  ctx.fillStyle = body;
  ctx.beginPath(); ctx.roundRect(-15,-56,30,8,3); ctx.fill();
  // brazo con puño arriba celebrando (alterna)
  const up = Math.sin(phase*5) > 0;
  ctx.strokeStyle = jersey; ctx.lineWidth = 9;
  ctx.fillStyle = skin;
  if (up) {
    ctx.beginPath(); ctx.moveTo(-13,-76); ctx.lineTo(-26,-100); ctx.stroke();
    ctx.beginPath(); ctx.arc(-26,-100,6,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(13,-76); ctx.lineTo(24,-58); ctx.stroke();
    ctx.beginPath(); ctx.arc(24,-58,6,0,Math.PI*2); ctx.fill();
  } else {
    ctx.beginPath(); ctx.moveTo(13,-76); ctx.lineTo(26,-100); ctx.stroke();
    ctx.beginPath(); ctx.arc(26,-100,6,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-13,-76); ctx.lineTo(-24,-58); ctx.stroke();
    ctx.beginPath(); ctx.arc(-24,-58,6,0,Math.PI*2); ctx.fill();
  }
  // cabeza
  ctx.fillStyle = skin;
  ctx.beginPath(); ctx.arc(0, -98, 16, 0, Math.PI*2); ctx.fill();
  // pelo corto
  ctx.fillStyle = '#4a3620';
  ctx.beginPath(); ctx.arc(0, -102, 16, Math.PI*1.0, Math.PI*2.0); ctx.fill();
  // cara feliz + barba
  ctx.fillStyle = '#3a2a1a';
  ctx.beginPath(); ctx.arc(-5,-99,2.4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(5,-99,2.4,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#3a2a1a'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0,-93,6,0.15,Math.PI-0.15); ctx.stroke();
  ctx.fillStyle = 'rgba(90,58,30,.45)';
  ctx.beginPath(); ctx.arc(0,-90,9,0.1,Math.PI*0.9); ctx.fill();
  ctx.restore();
}

// ---------- Dibujo: copa gigante ----------
function drawTrophy(x, baseY, s) {
  ctx.save();
  ctx.translate(x, baseY);
  ctx.scale(s, s);
  const gold = '#ffc63a', goldDark = '#d99a1a', goldLight = '#ffe28a';

  ctx.fillStyle = '#7a4a2a';
  ctx.beginPath(); ctx.roundRect(-34, -14, 68, 14, 4); ctx.fill();
  ctx.fillStyle = '#5a3620';
  ctx.beginPath(); ctx.roundRect(-26, -24, 52, 10, 3); ctx.fill();
  // placa
  ctx.fillStyle = gold;
  ctx.beginPath(); ctx.roundRect(-16, -12, 32, 9, 2); ctx.fill();
  // tallo
  ctx.fillStyle = goldDark;
  ctx.beginPath(); ctx.roundRect(-6, -44, 12, 20, 4); ctx.fill();
  // copa
  ctx.fillStyle = gold;
  ctx.beginPath();
  ctx.moveTo(-32, -100);
  ctx.quadraticCurveTo(-34, -52, 0, -44);
  ctx.quadraticCurveTo(34, -52, 32, -100);
  ctx.closePath(); ctx.fill();
  // borde superior
  ctx.fillStyle = goldLight;
  ctx.beginPath(); ctx.roundRect(-34, -106, 68, 9, 4); ctx.fill();
  // asas
  ctx.strokeStyle = gold; ctx.lineWidth = 8; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(-38, -84, 14, Math.PI*0.4, Math.PI*1.5); ctx.stroke();
  ctx.beginPath(); ctx.arc(38, -84, 14, Math.PI*1.5, Math.PI*0.6); ctx.stroke();
  // brillo
  ctx.fillStyle = 'rgba(255,255,255,.5)';
  ctx.beginPath(); ctx.ellipse(-14, -80, 6, 16, 0.15, 0, Math.PI*2); ctx.fill();
  // estrella
  ctx.fillStyle = goldDark;
  ctx.save(); ctx.translate(0, -74);
  ctx.beginPath();
  for (let i=0;i<10;i++) {
    const r = i%2===0 ? 12 : 5;
    const a = -Math.PI/2 + i*Math.PI/5;
    ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);

  ctx.closePath(); ctx.fill();
  ctx.restore();
  ctx.restore();
}

// ---------- Dibujo: pastor alemán ----------
function drawShepherd(d) {
  ctx.save();
  ctx.translate(d.x, d.y);
  if (d.state === 'knocked') ctx.rotate(d.rot);
  const tan = '#b5824a', black = '#2e2a26', dark = '#1a1815';
  const bob = d.state === 'run' ? Math.sin(d.phase*20)*2 : 0;
  ctx.translate(0, bob);

  ctx.strokeStyle = black; ctx.lineWidth = 9; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(34,-42); ctx.quadraticCurveTo(48,-34,52,-20); ctx.stroke();

  ctx.strokeStyle = tan; ctx.lineWidth = 8;
  for (let i=0;i<4;i++) {
    const px = -22 + i*16;
    const ang = d.state === 'run' ? Math.sin(d.phase*20 + i*Math.PI/1.3)*0.6 : 0.5 - i*0.3;
    ctx.beginPath();
    ctx.moveTo(px, -28);
    ctx.lineTo(px + Math.sin(ang)*17, -28 + Math.cos(ang)*26);
    ctx.stroke();
  }

  ctx.fillStyle = tan;
  ctx.beginPath(); ctx.ellipse(4, -42, 36, 21, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = black;
  ctx.beginPath(); ctx.ellipse(8, -50, 30, 13, -0.08, 0, Math.PI*2); ctx.fill();

  ctx.fillStyle = tan;
  ctx.beginPath(); ctx.arc(-30, -60, 16, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = black;
  ctx.beginPath(); ctx.arc(-30, -63, 15, Math.PI*0.9, Math.PI*2.05); ctx.fill();
  ctx.fillStyle = tan;
  ctx.beginPath(); ctx.ellipse(-42, -55, 11, 7, -0.1, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = dark;
  ctx.beginPath(); ctx.arc(-51, -56, 3.2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = black;
  ctx.beginPath(); ctx.moveTo(-36,-72); ctx.lineTo(-33,-90); ctx.lineTo(-26,-72); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-24,-73); ctx.lineTo(-18,-89); ctx.lineTo(-13,-70); ctx.closePath(); ctx.fill();
  if (d.state === 'knocked') {
    // ojitos de mareo x.x y estrellitas
    ctx.strokeStyle = dark; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(-38,-66); ctx.lineTo(-31,-59); ctx.moveTo(-31,-66); ctx.lineTo(-38,-59); ctx.stroke();
    ctx.fillStyle = '#ffd24a'; ctx.font = '14px sans-serif'; ctx.textAlign='center';
    ctx.fillText('✦', -30, -95);
    ctx.fillText('✦', -14, -100);
  } else {
    ctx.fillStyle = dark;
    ctx.beginPath(); ctx.arc(-34, -62, 2.6, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#f08a8a';
    ctx.beginPath(); ctx.ellipse(-44, -47, 3, 5, 0.3, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

// ---------- Dibujo: pájaro ----------
function drawBird(b) {
  ctx.save();
  ctx.translate(b.x, b.y);
  if (b.dir < 0) ctx.scale(-1,1);
  if (b.state !== 'fly') ctx.rotate(Math.max(0, Math.sin(b.t*4)) * 0.35);
  const body = b.color, wing = '#5a4a8a';
  ctx.fillStyle = body;
  ctx.beginPath(); ctx.ellipse(0, 0, 9, 7, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(8, -6, 5.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#f0a030';
  ctx.beginPath(); ctx.moveTo(12,-7); ctx.lineTo(18,-5.5); ctx.lineTo(12,-4); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(9.5,-7,1.3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = wing;
  ctx.save();
  ctx.translate(-1,-2);
  if (b.state === 'fly') ctx.rotate(Math.sin(b.t*28)*0.9); else ctx.rotate(0.2);
  ctx.beginPath(); ctx.ellipse(-3, 0, 8, 4, -0.4, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  ctx.fillStyle = wing;
  ctx.beginPath(); ctx.moveTo(-8,-1); ctx.lineTo(-15,-4); ctx.lineTo(-14,2); ctx.closePath(); ctx.fill();
  if (b.state !== 'fly') {
    ctx.strokeStyle = '#f0a030'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(-2,6); ctx.lineTo(-2,11); ctx.moveTo(3,6); ctx.lineTo(3,11); ctx.stroke();
  }
  ctx.restore();
}

// ---------- Dibujo: elementos ----------
function drawBoneAt(x, y, s=1, rot=0) {
  ctx.save(); ctx.translate(x,y); ctx.rotate(rot); ctx.scale(s,s);
  ctx.fillStyle = '#fffbe8'; ctx.strokeStyle = '#d9cba0'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.roundRect(-10,-3,20,6,3); ctx.fill(); ctx.stroke();
  [[-10,-4],[-10,4],[10,-4],[10,4]].forEach(([bx,by])=>{
    ctx.beginPath(); ctx.arc(bx,by,4.5,0,Math.PI*2); ctx.fill(); ctx.stroke();
  });
  ctx.restore();
}
function drawRock(o) {
  const gy = terrainAt(o.x);
  ctx.fillStyle = '#8a8a92';
  ctx.beginPath();
  ctx.moveTo(o.x - o.w/2, gy);
  ctx.quadraticCurveTo(o.x - o.w/2, gy - o.h, o.x, gy - o.h);
  ctx.quadraticCurveTo(o.x + o.w/2, gy - o.h, o.x + o.w/2, gy);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#a5a5ad';
  ctx.beginPath(); ctx.ellipse(o.x - o.w*0.15, gy - o.h*0.65, o.w*0.18, o.h*0.15, -0.4, 0, Math.PI*2); ctx.fill();
}
function drawBush(o) {
  const gy = terrainAt(o.x);
  ctx.fillStyle = '#4a8a3a';
  [[-o.w*0.25,0.8],[0,1],[o.w*0.25,0.8]].forEach(([dx,s])=>{
    ctx.beginPath(); ctx.arc(o.x+dx, gy - o.h*0.45*s, o.h*0.5*s, 0, Math.PI*2); ctx.fill();
  });
  ctx.fillStyle = '#e05a7a';
  ctx.beginPath(); ctx.arc(o.x - o.w*0.15, gy - o.h*0.6, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(o.x + o.w*0.2, gy - o.h*0.4, 3, 0, Math.PI*2); ctx.fill();
}
function drawPuddle(o) {
  const gy = terrainAt(o.x);
  ctx.fillStyle = '#5aa9d6';
  ctx.beginPath(); ctx.ellipse(o.x, gy + 6, o.w/2, 9, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,.5)';
  ctx.beginPath(); ctx.ellipse(o.x - o.w*0.18, gy + 3, o.w*0.16, 3, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,.4)'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(o.x - o.w*0.25, gy + 8);
  ctx.quadraticCurveTo(o.x, gy + 6 + Math.sin(runPhase*4)*2, o.x + o.w*0.25, gy + 8);
  ctx.stroke();
}
function drawWater(o) {
  // franja de agua que sigue el terreno (etapa 5)
  const x0 = o.x - o.w/2, x1 = o.x + o.w/2;
  ctx.fillStyle = '#4a9ad6';
  ctx.beginPath();
  ctx.moveTo(x0, terrainAt(x0) - 2);
  for (let x = x0; x <= x1; x += 14) {
    ctx.lineTo(x, terrainAt(x) - 2 + Math.sin(runPhase*5 + x*0.08)*2.5);
  }
  ctx.lineTo(x1, terrainAt(x1) + 14);
  for (let x = x1; x >= x0; x -= 14) ctx.lineTo(x, terrainAt(x) + 14);
  ctx.closePath(); ctx.fill();
  // espumita
  ctx.fillStyle = 'rgba(255,255,255,.55)';
  for (let x = x0 + 10; x < x1; x += 34) {
    ctx.beginPath(); ctx.ellipse(x, terrainAt(x) - 1 + Math.sin(runPhase*5 + x*0.08)*2.5, 6, 2, 0, 0, Math.PI*2); ctx.fill();
  }
}
function drawLog(o) {
  // tronco visto de punta, rodando como rueda
  const gy = terrainAt(o.x), r = o.w/2;
  ctx.save();
  ctx.translate(o.x, gy - r);
  ctx.rotate(o.roll);
  ctx.fillStyle = '#8a5a3a';
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill();
  // anillos del tronco
  ctx.strokeStyle = '#6a4228'; ctx.lineWidth = 2.5;
  [r*0.68, r*0.42, r*0.18].forEach(rr => {
    ctx.beginPath(); ctx.arc(0, 0, rr, 0, Math.PI*2); ctx.stroke();
  });
  // grieta que gira (para que se note el rodado)
  ctx.strokeStyle = '#5a3620'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(r*0.2, 0); ctx.lineTo(r*0.92, 0); ctx.stroke();
  // corteza
  ctx.strokeStyle = '#6a4228'; ctx.lineWidth = 5;
  ctx.beginPath(); ctx.arc(0, 0, r-2, 0, Math.PI*2); ctx.stroke();
  ctx.restore();
}
function drawBox(o) {
  const gy = terrainAt(o.x);
  ctx.save();
  ctx.translate(o.x, gy);
  const w = o.w, h1 = o.h*0.55, h2 = o.h*0.45;
  // caja de abajo
  ctx.fillStyle = '#c9a86b';
  ctx.beginPath(); ctx.roundRect(-w/2, -h1, w, h1, 3); ctx.fill();
  ctx.strokeStyle = '#a8865a'; ctx.lineWidth = 2;
  ctx.strokeRect(-w/2, -h1, w, h1);
  // cinta adhesiva
  ctx.fillStyle = '#b8945a';
  ctx.fillRect(-4, -h1, 8, h1);
  // caja de arriba (más chica, un poco chueca)
  ctx.save();
  ctx.translate(2, -h1); ctx.rotate(-0.06);
  ctx.fillStyle = '#d4b47a';
  ctx.beginPath(); ctx.roundRect(-w*0.38, -h2, w*0.76, h2, 3); ctx.fill();
  ctx.strokeStyle = '#a8865a'; ctx.lineWidth = 2;
  ctx.strokeRect(-w*0.38, -h2, w*0.76, h2);
  ctx.fillStyle = '#b8945a';
  ctx.fillRect(-3, -h2, 6, h2);
  // solapas abiertas
  ctx.strokeStyle = '#a8865a'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(-w*0.38, -h2); ctx.lineTo(-w*0.48, -h2-8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(w*0.38, -h2); ctx.lineTo(w*0.48, -h2-8); ctx.stroke();
  ctx.restore();
  ctx.restore();
}
function drawFlag(x) {
  const gy = terrainAt(x);
  ctx.strokeStyle = '#666'; ctx.lineWidth = 5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(x, gy); ctx.lineTo(x, gy - 120); ctx.stroke();
  const cs = 9;
  for (let r=0;r<4;r++) for (let c=0;c<6;c++) {
    ctx.fillStyle = (r+c)%2===0 ? '#222' : '#fff';
    ctx.fillRect(x + 3 + c*cs, gy - 118 + r*cs, cs, cs);
  }
}
function drawTree(x, s) {
  ctx.save(); ctx.translate(x, terrainAt(x)); ctx.scale(s,s);
  ctx.fillStyle = '#8a5a3a';
  ctx.fillRect(-6, -55, 12, 55);
  ctx.fillStyle = '#5a9a4a';
  ctx.beginPath(); ctx.arc(0, -70, 28, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(-20, -55, 20, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(20, -55, 20, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}
function drawCloud(c) {
  ctx.fillStyle = 'rgba(255,255,255,.9)';
  ctx.save(); ctx.translate(c.x, c.y); ctx.scale(c.s, c.s);
  ctx.beginPath();
  ctx.arc(0,0,18,0,Math.PI*2); ctx.arc(20,-6,14,0,Math.PI*2); ctx.arc(-20,-4,13,0,Math.PI*2); ctx.arc(0,-12,15,0,Math.PI*2);
  ctx.fill(); ctx.restore();
}

  if (stage === 5) return {top:'#5e93dd', mid:'#9ec6ec', low:'#d9ead8', sun:'#fff1a6', far:'#7aa88a', far2:'#5c8c76', grass:'#5d9f58', grassDark:'#3b7444', earth:'#9b7245', earth2:'#6f4d32', ink:'#203d62'};
  if (stage === 2) return {top:'#8fdaf0', mid:'#c9f2ff', low:'#e9f7d7', sun:'#ffdf65', far:'#a7dfa1', far2:'#78bf76', grass:'#67bd58', grassDark:'#3e8a3e', earth:'#c99a62', earth2:'#8a6238', ink:'#25455a'};
  return {top:'#78d3f6', mid:'#bdefff', low:'#eaf8df', sun:'#ffdc5c', far:'#b3df9b', far2:'#7ac16c', grass:'#70c85d', grassDark:'#479446', earth:'#d2aa72', earth2:'#9c7246', ink:'#25455a'};
}

function drawPremiumSky(a) {
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,a.top); g.addColorStop(.58,a.mid); g.addColorStop(1,a.low);
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);

  // halos de color tipo ilustración digital
  ctx.globalAlpha = .42;
  let r = Math.min(W,H)*.34;
  let halo = ctx.createRadialGradient(W*.82,H*.16,4,W*.82,H*.16,r);
  halo.addColorStop(0,'rgba(255,255,235,.95)'); halo.addColorStop(.42,'rgba(255,214,100,.35)'); halo.addColorStop(1,'rgba(255,214,100,0)');
  ctx.fillStyle = halo; ctx.beginPath(); ctx.arc(W*.82,H*.16,r,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;

  // sol pintado con brillo y rayos suaves
  const sx=W*.84, sy=H*.15, sr=Math.max(24,Math.min(W,H)*.055);
  ctx.save(); ctx.translate(sx,sy); ctx.rotate(runPhase*.08);
  ctx.strokeStyle='rgba(255,247,178,.45)'; ctx.lineWidth=3; ctx.lineCap='round';
  for(let i=0;i<12;i++){ const an=i*Math.PI/6; ctx.beginPath(); ctx.moveTo(Math.cos(an)*sr*1.35,Math.sin(an)*sr*1.35); ctx.lineTo(Math.cos(an)*sr*1.8,Math.sin(an)*sr*1.8); ctx.stroke(); }
  ctx.restore();
  const sg=ctx.createRadialGradient(sx-sr*.3,sy-sr*.35,2,sx,sy,sr*1.05);
  sg.addColorStop(0,'#fffbd1'); sg.addColorStop(.55,a.sun); sg.addColorStop(1,'#f2aa3e');
  ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2); ctx.fill();
}

function drawPainterlyCloud(c) {
  ctx.save(); ctx.translate(c.x,c.y); ctx.scale(c.s,c.s);
  ctx.globalAlpha=.92;
  const cg=ctx.createLinearGradient(-45,-30,60,28);
  cg.addColorStop(0,'rgba(255,255,255,.98)'); cg.addColorStop(.8,'rgba(230,246,255,.92)');
  ctx.fillStyle=cg;
  ctx.beginPath();
  ctx.arc(-32,4,17,0,Math.PI*2); ctx.arc(-12,-7,25,0,Math.PI*2); ctx.arc(18,-10,31,0,Math.PI*2); ctx.arc(48,4,22,0,Math.PI*2); ctx.arc(6,10,32,0,Math.PI*2);
  ctx.fill();
  ctx.globalAlpha=.35; ctx.fillStyle='rgba(130,180,210,.45)';
  ctx.beginPath(); ctx.ellipse(8,18,60,9,0,0,Math.PI*2); ctx.fill();
  ctx.restore(); ctx.globalAlpha=1;
}

function drawPremiumHills(a) {
  const base=groundLevel();
  const layer=(color, offset, amp, ybase, speedMul)=>{
    ctx.fillStyle=color; ctx.beginPath(); ctx.moveTo(0,H);
    for(let x=0;x<=W+28;x+=28){ const wx=x+scrollX*speedMul+offset; const y=ybase - Math.sin(wx*.0045)*amp - Math.sin(wx*.010+1.7)*amp*.35; ctx.lineTo(x,y); }
    ctx.lineTo(W,H); ctx.closePath(); ctx.fill();
  };
  layer(a.far, 40, H*.045, base-H*.18, .11);
  layer(a.far2, 120, H*.065, base-H*.105, .18);

  // cerros redondos originales, pero con sombra y luz
  hills.forEach((h,i)=>{
    const grad=ctx.createLinearGradient(0,base-h.h*2,0,base);
    grad.addColorStop(0, i%2?shade(a.far,16):shade(a.far2,20)); grad.addColorStop(1, i%2?a.far:a.far2);
    ctx.fillStyle=grad;
    ctx.beginPath(); ctx.moveTo(h.x-20,base);
    ctx.quadraticCurveTo(h.x+h.w*.5,base-h.h*2.15,h.x+h.w+20,base);
    ctx.closePath(); ctx.fill();
  });
}

function shade(hex, amt){
  const n=parseInt(hex.slice(1),16); let r=(n>>16)+amt, g=((n>>8)&255)+amt, b=(n&255)+amt;
  r=Math.max(0,Math.min(255,r)); g=Math.max(0,Math.min(255,g)); b=Math.max(0,Math.min(255,b));
  return '#'+(b|g<<8|r<<16).toString(16).padStart(6,'0');
}

function drawPremiumGround(a) {
  const gy = groundLevel();
  ctx.save();
  if (stage === 5) {
    const step=10;
    const topGrad=ctx.createLinearGradient(0,groundLevel()-95,0,H);
    topGrad.addColorStop(0,shade(a.grass,34)); topGrad.addColorStop(.18,a.grass); topGrad.addColorStop(.28,a.grassDark); topGrad.addColorStop(.29,a.earth); topGrad.addColorStop(1,a.earth2);
    ctx.fillStyle=topGrad; ctx.beginPath();
    for(let x=0;x<=W+step;x+=step){ const y=terrainAt(x); if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); }
    ctx.lineTo(W+step,H); ctx.lineTo(0,H); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.36)'; ctx.lineWidth=2;
    ctx.beginPath(); for(let x=0;x<=W+step;x+=step){ const y=terrainAt(x)+1; if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); } ctx.stroke();
    ctx.strokeStyle='rgba(20,70,32,.58)'; ctx.lineWidth=7;
    ctx.beginPath(); for(let x=0;x<=W+step;x+=step){ const y=terrainAt(x)+7; if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); } ctx.stroke();
  } else {
    const g=ctx.createLinearGradient(0,gy-32,0,H);
    g.addColorStop(0,shade(a.grass,38)); g.addColorStop(.12,a.grass); g.addColorStop(.26,a.grassDark); g.addColorStop(.27,a.earth); g.addColorStop(1,a.earth2);
    ctx.fillStyle=g; ctx.fillRect(0,gy-22,W,H-gy+22);
    ctx.fillStyle='rgba(255,255,255,.30)'; ctx.fillRect(0,gy-21,W,4);
    ctx.fillStyle='rgba(24,85,38,.44)'; ctx.fillRect(0,gy-13,W,8);
  }

  // tierra, piedritas y sombras: todas amarradas a scrollX para que realmente avancen.
  ctx.globalAlpha=.22; ctx.fillStyle='#36251b';
  for(let i=0;i<110;i++){
    const x=((i*47 - scrollX*.96)%(W+96)+W+96)%(W+96)-48;
    const baseY=stage===5?terrainAt(x):gy;
    const y=baseY+20+(i%7)*16;
    ctx.beginPath(); ctx.ellipse(x,y,8+(i%5)*3,2+(i%3),0,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  // Pasto en capas: foreground rápido, medio normal, fondo más lento. Además se inclina por viento.
  const wind = Math.sin(runPhase*2.6)*1.6 + Math.sin(runPhase*.7)*1.2;
  const drawBladeLayer = (count, spacing, parallax, alpha, scale, color1, color2, yOffset) => {
    ctx.save(); ctx.globalAlpha=alpha; ctx.lineCap='round';
    for(let i=0;i<count;i++){
      const worldSeed=i*spacing;
      const x=((worldSeed - scrollX*parallax)%(W+100)+W+100)%(W+100)-50;
      const baseY=(stage===5?terrainAt(x):gy)+yOffset;
      const h=(8+(i%8)*2.6 + Math.sin(i*0.9)*2)*scale;
      const lean=(Math.sin(i*1.73+runPhase*2.1)+wind)*3.2*scale;
      ctx.strokeStyle=(i%3===0)?color1:color2;
      ctx.lineWidth=Math.max(1,1.05*scale);
      ctx.beginPath();
      ctx.moveTo(x,baseY+3);
      ctx.quadraticCurveTo(x+lean*.25,baseY-h*.55,x+lean,baseY-h);
      ctx.stroke();
      // segunda brizna en algunos grupos para que se vea tupido y no estático
      if(i%4===0){
        ctx.globalAlpha=alpha*.78;
        ctx.beginPath(); ctx.moveTo(x+5,baseY+3); ctx.quadraticCurveTo(x+lean*.1+2,baseY-h*.45,x+lean*.55+4,baseY-h*.72); ctx.stroke();
        ctx.globalAlpha=alpha;
      }
    }
    ctx.restore();
  };
  drawBladeLayer(150, 15, .55, .28, .70, 'rgba(206,255,171,.75)', 'rgba(32,105,45,.78)', -2);
  drawBladeLayer(125, 20, .92, .55, 1.05, 'rgba(228,255,185,.88)', 'rgba(42,132,55,.90)', 0);
  drawBladeLayer(95, 28, 1.28, .88, 1.45, 'rgba(250,255,204,.95)', 'rgba(18,86,36,.96)', 2);

  // matas grandes del primer plano, visibles en movimiento.
  for(let i=0;i<34;i++){
    const x=((i*82 - scrollX*1.38)%(W+140)+W+140)%(W+140)-70;
    const y=(stage===5?terrainAt(x):gy)+4;
    const clumpH=18+(i%5)*5;
    ctx.save(); ctx.globalAlpha=.9; ctx.lineCap='round'; ctx.lineWidth=2.2;
    for(let k=0;k<7;k++){
      const dx=(k-3)*3.2;
      const lean=(Math.sin(i*2.1+k+runPhase*2.4)+wind)*5;
      ctx.strokeStyle=k%2?'rgba(20,92,38,.92)':'rgba(235,255,190,.9)';
      ctx.beginPath(); ctx.moveTo(x+dx,y+3); ctx.quadraticCurveTo(x+dx+lean*.25,y-clumpH*.55,x+dx+lean,y-clumpH); ctx.stroke();
    }
    ctx.restore();
  }

  // flores y tréboles también se mueven con el suelo.
  for(let i=0;i<42;i++){
    const x=((i*64 - scrollX*1.02)%(W+110)+W+110)%(W+110)-55;
    const y=(stage===5?terrainAt(x):gy)+1;
    if(i%4===0){
      const colors=['#ff6b8a','#ffd54f','#fff5c8','#b79cff'];
      ctx.fillStyle=colors[(i+stage)%colors.length];
      const sway=Math.sin(runPhase*2+i)*2;
      for(let k=0;k<5;k++){ const an=k*Math.PI*2/5; ctx.beginPath(); ctx.arc(x+sway+Math.cos(an)*3,y-13+Math.sin(an)*3,2.5,0,Math.PI*2); ctx.fill(); }
      ctx.fillStyle='#ffe56a'; ctx.beginPath(); ctx.arc(x+sway,y-13,1.8,0,Math.PI*2); ctx.fill();
    } else if(i%5===0) {
      ctx.fillStyle='rgba(255,255,255,.48)'; ctx.beginPath(); ctx.ellipse(x,y-8,2,5,.8,0,Math.PI*2); ctx.fill();
    }
  }
  ctx.restore();
}

function drawAtmosphericDetails(a) {
  // pájaros de fondo / destellos
  if (stage !== 5) {
    ctx.strokeStyle='rgba(45,74,84,.32)'; ctx.lineWidth=2; ctx.lineCap='round';
    for(let i=0;i<5;i++){ const x=(W*.12+i*W*.18-scrollX*.045)%(W+60); const y=H*.13+Math.sin(runPhase+i)*20; ctx.beginPath(); ctx.moveTo(x-8,y); ctx.quadraticCurveTo(x-3,y-5,x,y); ctx.quadraticCurveTo(x+3,y-5,x+8,y); ctx.stroke(); }
  }
  // flores y piedritas decorativas al frente
  for(let i=0;i<28;i++){
    const x=(i*74-scrollX*.82)%(W+90)-40; const y=stage===5?terrainAt(x)+2:groundLevel()+2; const colors=['#ff6b8a','#ffd54f','#fff5c8','#7ee081','#a58cff'];
    ctx.fillStyle=colors[(i+stage)%colors.length];
    if(i%3===0){ ctx.beginPath(); ctx.arc(x,y-8,2.8,0,Math.PI*2); ctx.arc(x+5,y-7,2.8,0,Math.PI*2); ctx.arc(x+2,y-12,2.8,0,Math.PI*2); ctx.fill(); }
    else { ctx.fillStyle='rgba(105,77,48,.2)'; ctx.beginPath(); ctx.ellipse(x,y+5,5,2,0,0,Math.PI*2); ctx.fill(); }
  }
}

function drawCinematicOverlay() {
  // viñeta cinematográfica + luz superior
  ctx.save();
  let v=ctx.createRadialGradient(W*.5,H*.46,Math.min(W,H)*.2,W*.5,H*.46,Math.max(W,H)*.72);
  v.addColorStop(0,'rgba(0,0,0,0)'); v.addColorStop(.72,'rgba(0,0,0,.03)'); v.addColorStop(1,'rgba(5,18,32,.28)');

  ctx.fillStyle='rgba(255,255,255,.09)'; ctx.fillRect(0,0,W,Math.max(12,H*.025));

}

function drawGlassPanel(x,y,w,h,r) {

  ctx.shadowColor='transparent';
  ctx.fillStyle='rgba(255,255,255,.28)'; ctx.beginPath(); ctx.roundRect(x+5,y+5,w-10,Math.max(5,h*.28),Math.max(4,r*.7)); ctx.fill();

function drawPremiumCard() {
  const cfg=STAGES[stage];
  ctx.save();
  const grad=ctx.createLinearGradient(0,0,W,H); grad.addColorStop(0,'rgba(31,78,112,.72)'); grad.addColorStop(.5,'rgba(90,160,180,.42)'); grad.addColorStop(1,'rgba(255,220,140,.35)');
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
  const cw=Math.min(W*.78,720), ch=Math.min(H*.52,330), x=(W-cw)/2, y=(H-ch)/2;
  drawGlassPanel(x,y,cw,ch,32);
  ctx.textAlign='center'; ctx.lineJoin='round';
  ctx.font='900 '+Math.min(64,W*.072)+'px "Trebuchet MS", sans-serif'; ctx.strokeStyle='rgba(35,77,99,.35)'; ctx.lineWidth=8; ctx.fillStyle='#fff';
  ctx.strokeText(cfg.title,W/2,y+ch*.32); ctx.fillText(cfg.title,W/2,y+ch*.32);
  ctx.font='900 '+Math.min(30,W*.034)+'px "Trebuchet MS", sans-serif'; ctx.strokeStyle='rgba(232,151,74,.5)'; ctx.lineWidth=5; ctx.fillStyle='#fff8df';
  wrapText(cfg.sub,W/2,y+ch*.52,cw*.82,Math.min(34,W*.04));
  if(stateT>.8){
    const pulse=1+Math.sin(runPhase*5)*.04; ctx.save(); ctx.translate(W/2,y+ch*.78); ctx.scale(pulse,pulse);
    ctx.fillStyle='#e8974a'; ctx.beginPath(); ctx.roundRect(-130,-25,260,50,25); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='900 20px "Trebuchet MS", sans-serif'; ctx.fillText('Toca para empezar',0,7); ctx.restore();
  }
  ctx.restore();
}

function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(' '); let line='';
  for(let n=0;n<words.length;n++){ const test=line+words[n]+' '; if(ctx.measureText(test).width>maxWidth && n>0){ ctx.strokeText(line,x,y); ctx.fillText(line,x,y); line=words[n]+' '; y+=lineHeight; } else line=test; }
  ctx.strokeText(line,x,y); ctx.fillText(line,x,y);
}
// ---------- Escena ----------
function drawScene() {
  const a = stageArt();
  drawPremiumSky(a);
  clouds.forEach(c => drawPainterlyCloud(c));
  drawPremiumHills(a);
  trees.forEach(tr => drawTree(tr.x, tr.s));
  drawPremiumGround(a);
  drawAtmosphericDetails(a);
}

function moveWorld(dt, sp) {
  // El suelo y el pasto también avanzan; antes solo corrían el fondo y los personajes.
  scrollX += sp*dt;
  clouds.forEach(c => { c.x -= sp*0.12*dt; if (c.x < -80) { c.x = W + 80; c.y = H*0.08 + Math.random()*H*0.22; } });
  hills.forEach(h => { h.x -= sp*0.25*dt; if (h.x + h.w < 0) h.x = W; });
  trees.forEach(tr => { tr.x -= sp*0.6*dt; if (tr.x < -60) { tr.x = W + 60 + Math.random()*120; tr.s = 0.8+Math.random()*0.5; } });
}

function spawnParticleBurst(x, y, color, n=10) {
  for (let i=0;i<n;i++) particles.push({
    x, y, vx:(Math.random()-0.5)*260, vy:-Math.random()*300-60,
    life: 0.7+Math.random()*0.5, t:0, color, r: 3+Math.random()*3, grav: 1
  });
}

// ---------- Update ----------
function updateRun(dt) {
  const cfg = STAGES[stage];
  t += dt;
  runPhase += dt;
  moveWorld(dt, speed);
  // scrollX ya se actualiza en moveWorld para todas las etapas.

  // física del grupo
  if (cfg.mode === 'punch') {
    player.y = terrainAt(player.x);
    player.onGround = true;
    if (player.punchT > 0) player.punchT -= dt;
  } else {
    if (!player.onGround) {
      const gBase = Math.max(H*3.4, 1700);
      const g = (player.jumpHeld && player.vy < 0) ? gBase * 0.42 : gBase;
      player.vy += g * dt;
      player.y += player.vy * dt;
      if (player.y >= terrainAt(player.x)) {
        player.y = terrainAt(player.x); player.vy = 0; player.onGround = true;
        spawnParticleBurst(player.x, player.y, '#d9b98a', 5);
      }
    } else {
      player.y = terrainAt(player.x); // sigue los cerros
    }
  }

  // spawn obstáculos
  nextObs -= dt;
  if (nextObs <= 0 && t < cfg.dur - 3) {
    if (cfg.water) {
      obstacles.push({ x: W + 120, w: 95 + Math.random()*60, h: 0, type: 'water', splashed:false });
      nextObs = 2.0 + Math.random()*1.4;
    } else if (stage === 4) {
      // todo lo que viene se destruye con el combo: troncos rodantes, cajas, piedras y arbustos
      const r = Math.random();
      if (r < 0.28) {
        // tronco que viene rodando en contra
        obstacles.push({ x: W + 100, w: 52, h: 52, type: 'log', roll: 0, extra: baseSpeed()*0.5, hit:false, dead:false });
      } else if (r < 0.56) {
        obstacles.push({ x: W + 80, w: 54, h: 60, type: 'box', hit:false, dead:false });
      } else if (r < 0.8) {
        obstacles.push({ x: W + 80, w: 46 + Math.random()*20, h: 34 + Math.random()*22, type: 'rock', hit:false, dead:false });
      } else {
        obstacles.push({ x: W + 80, w: 46 + Math.random()*20, h: 34 + Math.random()*22, type: 'bush', hit:false, dead:false });
      }
      nextObs = 1.7 + Math.random()*1.3;
    } else {
      const r = Math.random();
      let type;
      if (cfg.puddles && r < 0.35) type = 'puddle';
      else type = r < 0.68 ? 'rock' : 'bush';
      const isPuddle = type === 'puddle';
      obstacles.push({
        x: W + 80,
        w: isPuddle ? 70 + Math.random()*55 : 46 + Math.random()*20,
        h: isPuddle ? 0 : 34 + Math.random()*22,
        type, hit:false, splashed:false, dead:false
      });
      nextObs = (stage === 3 ? 1.4 : 1.6) + Math.random()*1.4;
    }
  }
  // huesos
  nextBone -= dt;
  if (nextBone <= 0 && t < cfg.dur - 2) {
    const inAir = cfg.mode === 'punch' ? false : Math.random() < 0.5;
    bones.push({ x: W + 40, yOff: inAir ? 90 + Math.random()*50 : 26, rot: 0, got:false });
    nextBone = 1.1 + Math.random()*1.3;
  }
  // pastor alemán
  if (cfg.dogs) {
    nextDog -= dt;
    if (nextDog <= 0 && t < cfg.dur - 5) {
      dogs.push({ x: W + 100, y: terrainAt(W+100), phase: Math.random()*10, hit: false, barked: false, state:'run', vx:0, vy:0, rot:0 });
      nextDog = 7 + Math.random()*5;
    }
  }
  // bandada de ~10 pájaros
  nextBird -= dt;
  if (nextBird <= 0 && t < cfg.dur - 4) {
    const bx = W + 60;
    const colors = ['#8a6ad1','#d16a8a','#6a9ad1','#6ad1a0','#d1b06a'];
    const n = 9 + Math.floor(Math.random()*3); // 9 a 11
    for (let i=0;i<n;i++) {
      birds.push({
        x: bx + i*24 + Math.random()*16, y: 0,
        state: 'ground', t: Math.random()*3, dir: Math.random()<0.5?-1:1,
        vx: 0, vy: 0, color: colors[Math.floor(Math.random()*colors.length)]
      });
    }
    nextBird = 6.5 + Math.random()*4;
  }

  // mover obstáculos + colisiones
  obstacles.forEach(o => {
    o.x -= (speed + (o.extra || 0)) * dt;
    if (o.type === 'log') o.roll -= dt * 7;
  });
  obstacles = obstacles.filter(o => o.x > -160);
  bones.forEach(b => { b.x -= speed*dt; b.rot += dt*3; });
  bones = bones.filter(b => b.x > -60 && !b.got);

  obstacles.forEach(o => {
    if (o.type === 'puddle' || o.type === 'water') {
      if (!o.splashed && player.onGround &&
          player.x + 30 > o.x - o.w/2 && player.x - 20 < o.x + o.w/2) {
        o.splashed = true;
        sndSplash();
        const big = o.type === 'water';
        spawnParticleBurst(player.x + 10, player.y + 4, '#7ec8f0', big ? 20 : 14);
        splashTexts.push({ x: player.x + 10, y: player.y - 95, t: 0, big });
      }
    } else {
      if (!o.hit &&
          player.x - 30 < o.x + o.w/2 - 8 && player.x + 40 > o.x - o.w/2 + 8 &&
          player.y > terrainAt(o.x) - o.h + 10) {
        o.hit = true; bumpFlash = 0.35; ouchT = 1.0; sndBump();
      }
    }
  });
  bones.forEach(b => {
    const by = terrainAt(b.x) - b.yOff;
    const dx = (player.x + 10) - b.x, dy = (player.y - 45) - by;
    if (dx*dx + dy*dy < 48*48) { b.got = true; bonesCount++; sndBone(); spawnParticleBurst(b.x, by, '#ffe28a', 8); }
  });

  // perros
  dogs.forEach(d => {
    if (d.state === 'run') {
      d.x -= (speed + baseSpeed()*0.55) * dt;
      d.y = terrainAt(d.x);
      d.phase += dt;
      if (!d.barked && d.x < W - 60) { d.barked = true; sndBark(); }
      if (!d.hit && Math.abs(d.x - player.x) < 55 && player.y > terrainAt(d.x) - 62) {
        d.hit = true; bumpFlash = 0.35; ouchT = 1.0; sndBump();
      }
    } else {
      // volando por el combo de Franco, girando de espaldas
      d.x += (d.vx - speed) * dt;
      d.y += d.vy * dt;
      d.vy += 700 * dt;
      d.rot += dt * 7;
    }
  });
  dogs = dogs.filter(d => d.x > -140 && d.x < W + 300 && d.y < H + 150);

  // pájaros
  birds.forEach(b => {
    b.t += dt;
    if (b.state === 'ground') {
      b.x -= speed * dt;
      b.y = terrainAt(b.x) - 10;
      if (b.x - player.x < 200 && b.x > player.x - 40) {
        b.state = 'fly';
        b.vx = 60 + Math.random()*100;
        b.vy = -(200 + Math.random()*160);
        b.dir = 1;
        if (Math.random() < 0.4) sndChirp();
      }
    } else {
      b.x += (b.vx - speed) * dt;
      b.y += b.vy * dt;
      b.vy -= 30 * dt;
    }
  });
  birds = birds.filter(b => b.x > -80 && b.y > -80);

  splashTexts.forEach(s => { s.t += dt; s.y -= 30*dt; });
  splashTexts = splashTexts.filter(s => s.t < 1);
  powTexts.forEach(p => { p.t += dt; p.y -= 40*dt; });
  powTexts = powTexts.filter(p => p.t < 0.9);

  if (bumpFlash > 0) bumpFlash -= dt;
  if (ouchT > 0) ouchT -= dt;

  if ((stage === 3 || stage === 5) && Math.random() < dt*0.7) sndMoto();

  // fin de etapa
  if (t >= cfg.dur) {
    obstacles = []; dogs = dogs.filter(d => d.state === 'knocked');
    birds.forEach(b => { if (b.state==='ground'){ b.state='fly'; b.vx=80; b.vy=-260; } });
    if (stage === 1) { state = 'arrive'; stateT = 0; francoX = W + 80; }
    else if (stage === 4) { state = 'protect'; stateT = 0; sndWin(); }
    else if (stage === 5) { state = 'finish'; stateT = 0; flagX = W + 120; }
    else { showCard(stage + 1); }
  }
}

function updateFlyingBirds(dt, worldSp) {
  birds.forEach(b => {
    b.t += dt;
    if (b.state === 'fly') { b.x += (b.vx - worldSp) * dt; b.y += b.vy * dt; b.vy -= 30*dt; }
  });
  birds = birds.filter(b => b.y > -80);
}

function update(dt) {
  if (state === 'card') {
    stateT += dt;
    if (stateT > 2.6) beginStage(stage);
  }
  else if (state === 'run') updateRun(dt);
  else if (state === 'arrive') {
    runPhase += dt; stateT += dt;
    moveWorld(dt, speed*0.6);
    updateFlyingBirds(dt, speed*0.6);
    francoX -= speed*0.75*dt;
    const meetX = Math.min(W*0.62, W - 140);
    if (francoX <= meetX) {
      francoX = meetX;
      player.x += speed*0.7*dt;
      if (player.x >= francoX - 85) {
        player.x = francoX - 85;
        state = 'meet'; stateT = 0; sndWin();
      }
    }
  }
  else if (state === 'meet') {
    runPhase += dt; stateT += dt;
    if (Math.random() < dt*6) {
      hearts.push({ x: player.x + Math.random()*(francoX - player.x), y: groundLevel() - 100 - Math.random()*40,
                    vy: -40 - Math.random()*40, t:0, life: 2, s: 0.7+Math.random()*0.8 });
    }
    if (stateT > 3.2) showCard(2);
  }
  else if (state === 'protect') {
    // fin de la etapa 4: mamá orgullosa con corazones, Franco mostrando los músculos
    runPhase += dt; stateT += dt;
    if (Math.random() < dt*9) {
      const jx = player.x - 150;
      hearts.push({ x: jx - 25 + Math.random()*50, y: groundLevel() - 95 - Math.random()*20,
                    vy: -50 - Math.random()*40, t:0, life: 2.2, s: 0.8+Math.random()*0.9 });
    }
    if (stateT > 3.6) showCard(5);
  }
  else if (state === 'finish') {
    runPhase += dt; stateT += dt;
    moveWorld(dt, speed);
    scrollX += speed*dt;
    updateFlyingBirds(dt, speed);
    player.y = terrainAt(player.x);
    flagX -= speed*dt;
    const stopX = player.x + 80;
    if (flagX <= stopX) {
      flagX = stopX;
      state = 'party'; partyT = 0; sndTrophy();
    }
  }
  else if (state === 'party') {
    partyT += dt; runPhase += dt;
    if (Math.random() < dt*8) {
      hearts.push({ x: W*0.2 + Math.random()*W*0.6, y: terrainAt(W/2) - 120 - Math.random()*40,
                    vy: -40 - Math.random()*40, t:0, life: 2, s: 0.7+Math.random()*0.8 });
    }
    if (Math.random() < dt*16) {
      particles.push({ x: Math.random()*W, y: -10, vx:(Math.random()-0.5)*60, vy: 80+Math.random()*100,
                       life: 3, t:0, color: ['#ff6b8a','#ffd166','#6bd1ff','#9be06b','#c79bff'][Math.floor(Math.random()*5)], r: 4+Math.random()*3, grav:0.1 });
    }
  }

  hearts.forEach(hh => { hh.t += dt; hh.y += hh.vy*dt; });
  hearts = hearts.filter(hh => hh.t < hh.life);
  particles.forEach(p => { p.t += dt; p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 500*dt*(p.grav!==undefined?p.grav:1); });
  particles = particles.filter(p => p.t < p.life);
}

// ---------- HUD ----------
function drawHUD() {
  const cfg = STAGES[stage];
  const bw = Math.min(W*0.56, 520), bx = (W-bw)/2, by = Math.max(14, H*.035);
  const prog = Math.min(t / cfg.dur, 1);

  // barra principal estilo juego móvil premium
  drawGlassPanel(bx-12, by-10, bw+24, 42, 23);
  ctx.fillStyle = 'rgba(38,70,88,.22)';
  ctx.beginPath(); ctx.roundRect(bx, by, bw, 18, 9); ctx.fill();
  const pg = ctx.createLinearGradient(bx,by,bx+bw,by);
  pg.addColorStop(0,'#6ee7ff'); pg.addColorStop(.45,'#58d56f'); pg.addColorStop(1,'#ffcf58');
  ctx.fillStyle = pg;
  ctx.beginPath(); ctx.roundRect(bx, by, Math.max(20, bw*prog), 18, 9); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.45)'; ctx.beginPath(); ctx.roundRect(bx+4,by+4,Math.max(8,bw*prog-8),5,3); ctx.fill();

  ctx.font = 'bold 24px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(cfg.goal, bx + bw + 28, by + 9);
  ctx.save(); ctx.translate(bx + bw*prog, by + 9); ctx.scale(1 + Math.sin(runPhase*8)*.05, 1 + Math.sin(runPhase*8)*.05); ctx.fillText(cfg.marker, 0, 0); ctx.restore();

  drawGlassPanel(bx, by + 34, 118, 32, 17);
  ctx.fillStyle = stageArt().ink; ctx.font = '900 15px "Trebuchet MS",sans-serif';
  ctx.fillText(cfg.title, bx + 59, by + 51);

  drawGlassPanel(16, by-8, 120, 44, 22);
  drawBoneAt(42, by + 13, 1.15, -0.3);
  ctx.fillStyle = stageArt().ink; ctx.font = '900 22px "Trebuchet MS",sans-serif'; ctx.textAlign='left';
  ctx.fillText('× ' + bonesCount, 64, by + 16);
  ctx.textBaseline = 'alphabetic';

  if (ouchT > 0) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, ouchT*2);
    ctx.fillStyle = '#c0392b'; ctx.strokeStyle='#fff'; ctx.lineWidth=5; ctx.font = '900 30px "Trebuchet MS",sans-serif'; ctx.textAlign='center';
    ctx.strokeText('¡Uy!', player.x + 20, player.y - 118);
    ctx.fillText('¡Uy!', player.x + 20, player.y - 118);
    ctx.restore();
  }
}

function bigText(txt, y, size, sub) {
  ctx.save();
  ctx.textAlign='center'; ctx.lineJoin='round';
  const font = '900 ' + size + 'px "Trebuchet MS", "Comic Sans MS", sans-serif';
  ctx.font = font;
  ctx.shadowColor='rgba(20,50,70,.28)'; ctx.shadowBlur=18; ctx.shadowOffsetY=8;
  ctx.strokeStyle = sub ? 'rgba(40,80,95,.35)' : 'rgba(232,151,74,.75)';
  ctx.fillStyle = sub ? '#fff7d7' : '#ffffff';
  ctx.lineWidth = sub ? 5 : 8;
  ctx.strokeText(txt, W/2, y);
  ctx.fillText(txt, W/2, y);
  ctx.shadowColor='transparent';
  ctx.restore();
}

// ---------- Draw ----------
function drawPlayers(happy) {
  const yP = player.y;
  if (bumpFlash > 0 && Math.floor(bumpFlash*20)%2===0) ctx.globalAlpha = 0.4;

  if (stage === 1) {
    drawYoshi(player.x, yP, runPhase, !player.onGround, happy, false);
  }
  else if (stage === 2) {
    const fx = player.x - 95;
    const hp = francoHandPoint(fx, yP);
    const cp = yoshiCollarPoint(player.x, yP);
    ctx.strokeStyle = '#c0392b'; ctx.lineWidth = 3; ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(hp.x, hp.y);
    ctx.quadraticCurveTo((hp.x+cp.x)/2, Math.max(hp.y, cp.y) + 18, cp.x, cp.y);
    ctx.stroke();
    drawFranco(fx, yP, runPhase, 'walk');
    drawYoshi(player.x, yP, runPhase, !player.onGround, happy, true);
  }
  else if (stage === 3) {
    drawFrancoMoto(player.x - 100, yP, runPhase, !player.onGround, 0);
    drawYoshi(player.x, yP, runPhase, !player.onGround, true, true);
  }
  else if (stage === 4) {
    // Jackie atrás, Yoshi al medio, Franco adelante protegiendo
    drawJackie(player.x - 150, yP, runPhase, 'walk');
    drawYoshi(player.x - 75, yP, runPhase, false, true, true);
    drawFranco(player.x, yP, runPhase, 'punchwalk', player.punchT);
  }
  else if (stage === 5) {
    // papá adelante, Franco atrás; ambos siguen su propio terreno + salto compartido
    const jumpOff = player.y - terrainAt(player.x);
    const fx = player.x - 95;
    const fy = terrainAt(fx) + jumpOff;
    drawFrancoMoto(fx, fy, runPhase, !player.onGround, player.onGround ? terrainSlope(fx) : 0);
    drawPapaMoto(player.x, yP, runPhase, !player.onGround, player.onGround ? terrainSlope(player.x) : 0);
  }
  ctx.globalAlpha = 1;
}

function draw() {
  drawScene();

  bones.forEach(b => drawBoneAt(b.x, terrainAt(b.x) - b.yOff, 1.3, b.rot));
  obstacles.forEach(o => {
    if (o.type === 'water') drawWater(o);
    else if (o.type === 'puddle') drawPuddle(o);
    else if (o.type === 'rock') drawRock(o);
    else if (o.type === 'log') drawLog(o);
    else if (o.type === 'box') drawBox(o);
    else drawBush(o);
  });
  birds.forEach(b => drawBird(b));
  dogs.forEach(d => drawShepherd(d));

  if (state === 'card') {
    drawPremiumCard();
  }
  else if (state === 'run') {
    drawPlayers(false);
    drawHUD();
    splashTexts.forEach(s => {
      ctx.globalAlpha = Math.max(0, 1 - s.t);
      ctx.fillStyle = '#2d6fd1'; ctx.font = 'bold ' + (s.big ? 32 : 26) + 'px "Comic Sans MS",sans-serif'; ctx.textAlign='center';
      ctx.fillText(s.big ? '¡Al agua! 💦' : '¡Splash! 💦', s.x, s.y);
      ctx.globalAlpha = 1;
    });
    powTexts.forEach(p => {
      ctx.globalAlpha = Math.max(0, 1 - p.t/0.9);
      ctx.fillStyle = '#e8452a'; ctx.font = 'bold 34px "Comic Sans MS",sans-serif'; ctx.textAlign='center';
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 5; ctx.lineJoin = 'round';
      ctx.strokeText('¡POW! 💥', p.x, p.y);
      ctx.fillText('¡POW! 💥', p.x, p.y);
      ctx.globalAlpha = 1;
    });
  }
  else if (state === 'arrive') {
    drawYoshi(player.x, player.y, runPhase, false, true, false);
    drawFranco(francoX, groundLevel(), runPhase, 'stand');
    bigText('¡Ahí está Franco!', H*0.2, Math.min(38, W*0.05));
  }
  else if (state === 'meet') {
    const hop = Math.abs(Math.sin(runPhase*6))*30;
    drawYoshi(player.x, groundLevel() - hop, runPhase, hop > 4, true, false);
    drawFranco(francoX, groundLevel(), runPhase, 'jumpparty');
    bigText('¡Se encontraron! 🎉', H*0.2, Math.min(40, W*0.055));
  }
  else if (state === 'protect') {
    const gy = groundLevel();
    drawJackie(player.x - 150, gy, runPhase, 'stand');
    const hop = Math.abs(Math.sin(runPhase*6))*26;
    drawYoshi(player.x - 75, gy - hop, runPhase, hop > 4, true, true);
    drawFranco(player.x, gy, runPhase, 'muscles');
    bigText('¡Franco protegió a mamá! 💪', H*0.2, Math.min(38, W*0.05));
  }
  else if (state === 'finish') {
    drawFlag(flagX);
    drawPlayers(true);
    bigText('¡Ahí está la meta!', H*0.2, Math.min(38, W*0.05));
  }
  else if (state === 'party') {
    // COPA GIGANTE al centro, familia completa celebrando
    const cx = W*0.5;
    const cupBase = terrainAt(cx);
    const cupScale = Math.min(W, H) * 0.0032;
    drawTrophy(cx, cupBase, Math.max(1.6, cupScale));

    drawFlag(flagX);
    // motos estacionadas a la izquierda (sin jinete: ¡ya se bajaron a celebrar!)
    drawPapaMoto(W*0.1, terrainAt(W*0.1), 0, false, terrainSlope(W*0.1), false);
    drawFrancoMoto(W*0.2, terrainAt(W*0.2), 0, false, terrainSlope(W*0.2), false);
    // papá y Franco celebrando a la derecha de la copa
    drawPapaStand(cx + Math.min(W,H)*0.24, terrainAt(cx + Math.min(W,H)*0.24), runPhase);
    const hop = Math.abs(Math.sin(runPhase*6))*26;
    drawFranco(cx + Math.min(W,H)*0.36, terrainAt(cx + Math.min(W,H)*0.36) - hop, runPhase, 'jumpparty');
    // Jackie y Yoshi llegaron a celebrar también, a la izquierda
    drawJackie(cx - Math.min(W,H)*0.26, terrainAt(cx - Math.min(W,H)*0.26), runPhase, 'stand');
    const hop2 = Math.abs(Math.sin(runPhase*6 + 1))*28;
    drawYoshi(cx - Math.min(W,H)*0.38, terrainAt(cx - Math.min(W,H)*0.38) - hop2, runPhase, hop2 > 4, true, false);

    bigText('¡GANARON LA GRAN COPA! 🏆', H*0.14, Math.min(44, W*0.055));
    bigText('La familia juntó ' + bonesCount + ' huesitos 🦴', H*0.24, Math.min(24, W*0.033), true);

    if (partyT > 2.5) {
      const pulse = 1 + Math.sin(runPhase*4)*0.05;
      ctx.save(); ctx.translate(W/2, H*0.9); ctx.scale(pulse, pulse);
      ctx.fillStyle = '#e8974a';
      ctx.beginPath(); ctx.roundRect(-140, -26, 280, 52, 26); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font = 'bold 22px "Comic Sans MS",sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('Tocar para jugar otra vez', 0, 1);
      ctx.restore();
      ctx.textBaseline = 'alphabetic';
    }
  }

  hearts.forEach(hh => {
    ctx.globalAlpha = Math.max(0, 1 - hh.t/hh.life);
    ctx.font = (22*hh.s) + 'px sans-serif'; ctx.textAlign='center';
    ctx.fillText('❤️', hh.x, hh.y);
    ctx.globalAlpha = 1;
  });
  particles.forEach(p => {
    ctx.globalAlpha = Math.max(0, 1 - p.t/p.life);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  });
  drawCinematicOverlay();
}

function frame(ts) {
  requestAnimationFrame(frame); // pedirlo primero: si algo falla, el juego no se congela
  const dt = Math.min((ts - last)/1000, 0.05);
  last = ts;
  if (portraitBlocked) return; // en vertical: juego en pausa hasta que giren el teléfono
  if (state !== 'menu') {
    try { update(dt); draw(); }
    catch(err) { console.error(err); }
  }
}
requestAnimationFrame(frame);
})();
</script>
