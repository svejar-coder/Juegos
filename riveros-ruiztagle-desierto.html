<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Riveros ❤️ Ruiz Tagle: Enamorados del Desierto</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:#000; touch-action:none; overscroll-behavior:none; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  #game { display:block; position:fixed; inset:0; }
  #rotate { position:fixed; inset:0; background:#1a1206; color:#ffdca0; z-index:50;
    display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:24px; gap:16px; }
  #rotate .ico { font-size:60px; animation:spin 2s ease-in-out infinite; }
  #rotate h2 { font-size:22px; } #rotate p { font-size:15px; opacity:.8; max-width:300px; }
  @keyframes spin { 0%,100%{transform:rotate(0)} 50%{transform:rotate(90deg)} }
  @media (orientation:portrait) { #rotate { display:flex; } }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="rotate">
  <div class="ico">📱</div>
  <h2>Gira el teléfono</h2>
  <p>Este desafío del desierto se juega en horizontal 🏜️🏍️</p>
</div>
<script>
(function(){
  "use strict";

  if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
      if (typeof r === "number") r = {tl:r,tr:r,br:r,bl:r};
      else r = {tl:r[0]||0,tr:r[1]||0,br:r[2]||0,bl:r[3]||0};
      this.beginPath(); this.moveTo(x+r.tl,y);
      this.lineTo(x+w-r.tr,y); this.quadraticCurveTo(x+w,y,x+w,y+r.tr);
      this.lineTo(x+w,y+h-r.br); this.quadraticCurveTo(x+w,y+h,x+w-r.br,y+h);
      this.lineTo(x+r.bl,y+h); this.quadraticCurveTo(x,y+h,x,y+h-r.bl);
      this.lineTo(x,y+r.tl); this.quadraticCurveTo(x,y,x+r.tl,y);
      this.closePath(); return this;
    };
  }

  var canvas = document.getElementById("game");
  var ctx = canvas.getContext("2d");
  var W=0,H=0,DPR=1,baseGroundY=0;
  var skyGrad=null, groundGrad=null, sunGrad=null;
  function resize(){
    DPR = Math.min(window.devicePixelRatio||1, 2);
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = Math.floor(W*DPR); canvas.height = Math.floor(H*DPR);
    canvas.style.width = W+"px"; canvas.style.height = H+"px";
    ctx.setTransform(DPR,0,0,DPR,0,0);
    baseGroundY = H*0.76;
    skyGrad=null; groundGrad=null; sunGrad=null;
    starsSky=[]; for(var i=0;i<70;i++) starsSky.push({x:Math.random()*W, y:Math.random()*H*0.55, s:1+Math.random()*1.5, ph:Math.random()*6});
  }
  window.addEventListener("resize", resize);
  window.addEventListener("orientationchange", function(){ setTimeout(resize,150); });
  resize();

  // ---------- Terreno ----------
  function terrainOffset(wp){
    return Math.sin(wp*0.0030)*(H*0.085)
         + Math.sin(wp*0.0013+1.7)*(H*0.05)
         + Math.sin(wp*0.0072+0.5)*(H*0.022);
  }
  function groundAtScreen(sx){ return baseGroundY - terrainOffset(worldX+sx); }

  // ---------- Audio ----------
  var AC=null, engineOn=false, muted=false, eNodes=null;
  function initAudio(){ if (AC) return; try { AC = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){ AC=null; } }
  function resumeAudio(){ if (AC && AC.state==="suspended") AC.resume(); }
  function startEngine(){
    if (!AC || engineOn) return; engineOn = true;
    var master = AC.createGain(); master.gain.value = 0.0;
    master.gain.setTargetAtTime(muted?0:0.09, AC.currentTime, 0.3);
    var lp = AC.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=900; lp.Q.value=6;
    var o1 = AC.createOscillator(); o1.type="sawtooth"; o1.frequency.value=95;
    var o2 = AC.createOscillator(); o2.type="sawtooth"; o2.frequency.value=95*1.01;
    var o3 = AC.createOscillator(); o3.type="square";  o3.frequency.value=47;
    var mix = AC.createGain(); mix.gain.value=0.6;
    var lfo = AC.createOscillator(); lfo.type="sine"; lfo.frequency.value=17;
    var lfoG = AC.createGain(); lfoG.gain.value=140;
    lfo.connect(lfoG); lfoG.connect(lp.frequency);
    o1.connect(mix); o2.connect(mix); o3.connect(mix);
    mix.connect(lp); lp.connect(master); master.connect(AC.destination);
    o1.start(); o2.start(); o3.start(); lfo.start();
    eNodes = {master:master, o1:o1, o2:o2, lfo:lfo};
  }
  function stopEngine(){
    if (!AC || !engineOn || !eNodes){ engineOn=false; return; }
    try { eNodes.master.gain.setTargetAtTime(0, AC.currentTime, 0.15);
      var n=eNodes; setTimeout(function(){ try{ n.o1.stop(); n.o2.stop(); n.lfo.stop(); }catch(e){} }, 400);
    } catch(e){}
    engineOn=false; eNodes=null;
  }
  function revEngine(a){ if (!AC || !eNodes) return; var f=95+a*45;
    try { eNodes.o1.frequency.setTargetAtTime(f, AC.currentTime, 0.05); eNodes.o2.frequency.setTargetAtTime(f*1.01, AC.currentTime, 0.05); } catch(e){} }
  function beep(freq,dur,type,vol){
    if (!AC || muted) return;
    var o=AC.createOscillator(), g=AC.createGain();
    o.type=type||"sine"; o.frequency.value=freq; g.gain.value=0.0001;
    g.gain.setTargetAtTime(vol||0.2, AC.currentTime, 0.005);
    g.gain.setTargetAtTime(0.0001, AC.currentTime+dur*0.6, dur*0.25);
    o.connect(g); g.connect(AC.destination); o.start(); o.stop(AC.currentTime+dur+0.05);
  }
  function wpSound(){ beep(700,0.09,"triangle",0.22); setTimeout(function(){beep(1050,0.13,"triangle",0.24);},70); }
  function starSound(){ beep(1200,0.07,"sine",0.18); setTimeout(function(){beep(1600,0.09,"sine",0.16);},60); }
  function hitSound(){ beep(120,0.14,"square",0.22); }
  function victorySound(){ [523,659,784,1046,1318,1046,1318].forEach(function(n,i){ setTimeout(function(){beep(n,0.2,"square",0.16);}, i*130); }); }
  function fireworkSound(){ beep(80,0.05,"square",0.12); setTimeout(function(){ for(var i=0;i<3;i++) beep(400+Math.random()*800,0.12,"sine",0.05); },40); }

  // ---------- Estado ----------
  var STATE="title", TARGET=7, collected=0, elapsed=0, stage=1, isNight=false, transTimer=0;
  var worldX=0, speed=0, baseSpeed=440, wheelSpin=0;
  var obstacles=[], waypoints=[], stars=[], particles=[], popups=[], pebbles=[], cacti=[];
  var starsSky=[];
  var spawnObs=0, spawnWp=0, spawnStar=0, bannerTimer=0, bannerText="", shake=0, flash=0, lastTS=0, winTimer=0;
  var rider={ x:0, y:0, vy:0, onGround:true, hitTimer:0, air:0 };

  function fullReset(){
    STATE="playing"; collected=0; elapsed=0; worldX=0; speed=baseSpeed; wheelSpin=0;
    stage=1; isNight=false; transTimer=0; skyGrad=null; groundGrad=null; sunGrad=null;
    obstacles=[]; waypoints=[]; stars=[]; particles=[]; popups=[]; pebbles=[]; cacti=[];
    spawnObs=1.1; spawnWp=0.9; spawnStar=1.6; bannerTimer=0; bannerText=""; shake=0; flash=0; winTimer=0;
    rider.x=W*0.32; rider.y=groundAtScreen(rider.x); rider.vy=0; rider.onGround=true; rider.hitTimer=0; rider.air=0;
    for (var i=0;i<90;i++) pebbles.push({ wp:Math.random()*W*2, d:8+Math.random()*44, s:1+Math.random()*2 });
    for (var c=0;c<6;c++) cacti.push({ wp:Math.random()*W*2, s:0.6+Math.random()*0.7 });
  }
  function startGame(){ initAudio(); resumeAudio(); fullReset(); startEngine(); try{ if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen(); }catch(e){} }
  function jump(){ if (STATE!=="playing") return; if (rider.onGround){ rider.vy=-820; rider.onGround=false; beep(300,0.08,"sine",0.1);
      for(var i=0;i<8;i++) particles.push({x:rider.x-30,y:rider.y,vx:-60-Math.random()*80,vy:-Math.random()*40,life:0.5,c:"#e8c9a0",g:200}); } }

  // ---------- Input ----------
  var lastTap=0, touchFired=false;
  function handleTap(){
    var now=Date.now(); if (now-lastTap<60) return; lastTap=now;
    if (STATE==="title") startGame();
    else if (STATE==="playing") jump();
    else if (STATE==="win" && winTimer<=0){ initAudio(); resumeAudio(); fullReset(); startEngine(); }
  }
  canvas.addEventListener("touchstart", function(e){ e.preventDefault(); touchFired=true; handleTap(); setTimeout(function(){touchFired=false;},120); }, {passive:false});
  canvas.addEventListener("pointerdown", function(e){ if(touchFired) return; handleTap(); });
  window.addEventListener("keydown", function(e){
    if (e.code==="Space"||e.code==="ArrowUp"||e.code==="Enter"){ e.preventDefault(); handleTap(); }
    if (e.code==="KeyM"){ muted=!muted; if(eNodes) eNodes.master.gain.setTargetAtTime(muted?0:0.09, AC.currentTime,0.1); }
  });
  canvas.addEventListener("pointerdown", function(e){
    if (STATE==="playing" && e.clientX>W-58 && e.clientY<52){ muted=!muted; if(eNodes) eNodes.master.gain.setTargetAtTime(muted?0:0.09, AC.currentTime,0.1); e.stopPropagation(); }
  }, true);

  // ---------- Spawns ----------
  var OBS=["cactus","roca","barril","tumbleweed"];
  function spawnObstacle(){ var t=OBS[Math.floor(Math.random()*OBS.length)]; obstacles.push({ wp:worldX+W+60, type:t, roll:0, extra:t==="tumbleweed"?170:0 }); }
  function spawnWaypoint(){ waypoints.push({ wp:worldX+W+80, r:24, got:false, high:Math.random()<0.4 }); }
  function addStar(){ stars.push({ wp:worldX+W+70, got:false, high:Math.random()<0.55, ph:Math.random()*6 }); }

  function penalize(sx,gy){
    rider.hitTimer=0.6; shake=0.35; flash=0.35; elapsed+=0.5; hitSound();
    popups.push({ x:rider.x, y:rider.y-90, text:"+0,5s", c:"#ff5252", life:1.1, vy:-40 });
    for (var p=0;p<14;p++) particles.push({ x:sx, y:gy, vx:(Math.random()-0.5)*220, vy:-Math.random()*260-20, life:0.7, c:"#c9752f", g:600 });
  }

  // ---------- Update ----------
  function update(dt){
    if (STATE==="win"){ if(winTimer>0) winTimer-=dt;
      if (Math.random()<0.05){ var fx=Math.random()*W, fy=H*0.15+Math.random()*H*0.3; fireworkSound();
        for(var f=0;f<26;f++){ var a=Math.random()*6.28, sp=60+Math.random()*140; particles.push({x:fx,y:fy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1.1,c:["#ff5252","#ffd54a","#4ad2ff","#7bed6b","#ff8ad2"][f%5],g:120}); } }
      if (Math.random()<0.5) particles.push({ x:Math.random()*W, y:-10, vx:(Math.random()-0.5)*50, vy:60+Math.random()*80, life:3.2, c:["#ffd54a","#ff7043","#4ad2ff","#7bed6b"][Math.floor(Math.random()*4)], g:0, conf:true });
      if (Math.random()<0.18){ var hx=W/2+(Math.random()-0.5)*180; particles.push({ x:hx, y:groundAtScreen(W/2)-70, vx:(Math.random()-0.5)*30, vy:-40-Math.random()*40, life:2.0, heart:true, c:"#ff4d7d", g:-20 }); }
      stepParticles(dt); stepPopups(dt);
      return;
    }
    if (STATE==="title"){
      if (Math.random()<0.16) particles.push({ x:Math.random()*W, y:H+12, vx:(Math.random()-0.5)*24, vy:-28-Math.random()*34, life:4.2, heart:true, c:["#ff4d7d","#ff7aa8","#ff2e63","#ff9ec2"][Math.floor(Math.random()*4)], g:-5 });
      stepParticles(dt);
      return;
    }
    if (STATE!=="playing") return;

    if (transTimer>0){ transTimer-=dt; revEngine(0.05); stepParticles(dt); stepPopups(dt);
      if (transTimer<=0){ stage=2; isNight=true; skyGrad=null; groundGrad=null; sunGrad=null;
        obstacles=[]; waypoints=[]; stars=[]; collected=0; spawnObs=1.0; spawnWp=0.8; spawnStar=1.6;
        bannerTimer=1.4; bannerText="ETAPA 2 · DE NOCHE 🌙"; }
      return;
    }

    elapsed += dt;
    speed = baseSpeed + Math.min(collected*16, 150);
    var dx = speed*dt; worldX += dx; wheelSpin += dx*0.03;

    var gl = groundAtScreen(rider.x);
    if (!rider.onGround){ rider.vy += 2050*dt; rider.y += rider.vy*dt; rider.air = Math.min(rider.air+dt,1);
      if (rider.y>=gl){ rider.y=gl; rider.vy=0; rider.onGround=true; rider.air=0;
        for(var d=0;d<10;d++) particles.push({x:rider.x-20,y:gl,vx:-40-Math.random()*90,vy:-Math.random()*60,life:0.5,c:"#e8c9a0",g:220}); }
    } else { rider.y = gl;
      // polvo continuo rueda trasera
      if (Math.random()<0.6) particles.push({x:rider.x-34,y:gl-2,vx:-50-Math.random()*70,vy:-10-Math.random()*30,life:0.5,c:"rgba(220,190,150,0.7)",g:120});
    }
    if (rider.hitTimer>0) rider.hitTimer-=dt;
    if (bannerTimer>0) bannerTimer-=dt;
    if (shake>0) shake-=dt;
    if (flash>0) flash-=dt;
    revEngine(rider.onGround?0.25:0.95);

    spawnObs-=dt; if (spawnObs<=0){ spawnObstacle(); spawnObs=1.0+Math.random()*0.85; }
    spawnStar-=dt; if (spawnStar<=0){ addStar(); spawnStar=1.4+Math.random()*1.3; }
    spawnWp-=dt; var inflight=0; for (var q=0;q<waypoints.length;q++) if(!waypoints[q].got) inflight++;
    if (spawnWp<=0 && collected+inflight<TARGET){ spawnWaypoint(); spawnWp=1.7+Math.random()*0.9; }

    var gAtRider = groundAtScreen(rider.x);
    for (var o=obstacles.length-1;o>=0;o--){
      var ob=obstacles[o]; if (ob.extra){ ob.wp-=ob.extra*dt; ob.roll+=dx*0.02+ob.extra*dt*0.02; }
      var sx=ob.wp-worldX; var oh=ob.type==="cactus"?70:(ob.type==="barril"?42:34); var ow=ob.type==="cactus"?32:(ob.type==="barril"?38:44);
      if (rider.hitTimer<=0 && Math.abs(rider.x-sx)<(ow/2+16) && rider.y>(gAtRider-oh)+10){ penalize(sx,gAtRider); }
      if (sx<-120) obstacles.splice(o,1);
    }
    for (var w=waypoints.length-1;w>=0;w--){
      var wp=waypoints[w], wsx=wp.wp-worldX, wy=groundAtScreen(wsx)-(wp.high?150:44);
      if (!wp.got){ var ry=rider.y-34, a=wsx-rider.x, b=wy-ry;
        if (Math.sqrt(a*a+b*b)<wp.r+30){ wp.got=true; collected++;
          wpSound(); popups.push({x:wsx,y:wy,text:"✓ "+collected+"/"+TARGET,c:"#7bed6b",life:1.1,vy:-50});
          for (var bp=0;bp<24;bp++) particles.push({x:wsx,y:wy,vx:(Math.random()-0.5)*280,vy:-Math.random()*280-30,life:1.0,c:bp%2?"#ffd54a":"#ff7043",g:400});
          if (collected>=TARGET){ if (stage===1){ transTimer=1.9; bannerTimer=0; bannerText=""; } else { winGame(); } }
          else { bannerTimer=1.0; bannerText="WAYPOINT "+collected+"/"+TARGET; }
        } }
      if (wsx<-120) waypoints.splice(w,1);
    }
    for (var s=stars.length-1;s>=0;s--){
      var st=stars[s], ssx=st.wp-worldX, sy=groundAtScreen(ssx)-(st.high?120:38);
      if (!st.got){ var ry2=rider.y-34, aa=ssx-rider.x, bb=sy-ry2;
        if (Math.sqrt(aa*aa+bb*bb)<34){ st.got=true; elapsed=Math.max(0,elapsed-0.5); starSound();
          popups.push({x:ssx,y:sy,text:"-0,5s",c:"#4ad2ff",life:1.0,vy:-50});
          for (var sp2=0;sp2<16;sp2++) particles.push({x:ssx,y:sy,vx:(Math.random()-0.5)*220,vy:-Math.random()*220-20,life:0.8,c:"#ffe14a",g:300}); } }
      if (ssx<-120) stars.splice(s,1);
    }
    stepParticles(dt); stepPopups(dt);
  }
  function stepParticles(dt){ for (var i=particles.length-1;i>=0;i--){ var p=particles[i]; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=(p.g||0)*dt; p.life-=dt; if(p.life<=0)particles.splice(i,1); } }
  function stepPopups(dt){ for (var i=popups.length-1;i>=0;i--){ var p=popups[i]; p.y+=(p.vy||-40)*dt; p.life-=dt; if(p.life<=0)popups.splice(i,1); } }
  function winGame(){ STATE="win"; stopEngine(); bannerTimer=0; winTimer=1.4; victorySound(); }

  // ---------- Cabezas ----------
  function headRuizTagle(hx,hy,sc){ sc=sc||1; ctx.save(); ctx.translate(hx,hy); ctx.scale(sc,sc);
    ctx.fillStyle="#e8b98f"; ctx.beginPath(); ctx.arc(0,0,15,0,7); ctx.fill();
    ctx.fillStyle="#1c1c1c"; ctx.beginPath(); ctx.arc(0,-3,15.5,Math.PI,0); ctx.fill(); ctx.fillRect(-15.5,-4,31,7);
    ctx.strokeStyle="#fff"; ctx.lineWidth=2.4; ctx.lineCap="round"; ctx.beginPath(); ctx.moveTo(-3,-9); ctx.quadraticCurveTo(3,-14,6,-6); ctx.stroke();
    ctx.fillStyle="rgba(120,90,60,.35)"; ctx.beginPath(); ctx.arc(0,6,10,0.15*Math.PI,0.85*Math.PI); ctx.fill();
    ctx.strokeStyle="#5a3b25"; ctx.lineWidth=1.6; ctx.beginPath(); ctx.arc(0,3,6,0.15*Math.PI,0.85*Math.PI); ctx.stroke();
    ctx.fillStyle="#333"; ctx.beginPath(); ctx.arc(5,-1,1.6,0,7); ctx.fill(); ctx.restore(); }
  function headRiveros(hx,hy,sc){ sc=sc||1; ctx.save(); ctx.translate(hx,hy); ctx.scale(sc,sc);
    ctx.fillStyle="#d9a985"; ctx.beginPath(); ctx.arc(0,0,15,0,7); ctx.fill();
    ctx.fillStyle="#2a241f"; ctx.beginPath(); ctx.moveTo(-15,-4); ctx.lineTo(-14,-16); ctx.lineTo(-8,-9); ctx.lineTo(-4,-20); ctx.lineTo(1,-10); ctx.lineTo(6,-19); ctx.lineTo(10,-8); ctx.lineTo(15,-16); ctx.lineTo(15,-3); ctx.closePath(); ctx.fill();
    ctx.fillStyle="#8f8a82"; ctx.beginPath(); ctx.arc(0,5,11,0.05*Math.PI,0.95*Math.PI); ctx.fill();
    ctx.fillStyle="#d9a985"; ctx.beginPath(); ctx.arc(0,1,8,0,7); ctx.fill();
    ctx.strokeStyle="#5a3b25"; ctx.lineWidth=1.6; ctx.beginPath(); ctx.arc(0,2,5,0.15*Math.PI,0.85*Math.PI); ctx.stroke();
    ctx.fillStyle="#333"; ctx.beginPath(); ctx.arc(5,-1,1.6,0,7); ctx.fill(); ctx.restore(); }

  // ---------- Rueda de cross ----------
  function drawKnobWheel(x,y,r){
    ctx.fillStyle="#161616"; ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill();
    ctx.strokeStyle="#000"; ctx.lineWidth=3;
    for(var i=0;i<12;i++){ var a=i/12*6.283+wheelSpin; ctx.beginPath(); ctx.moveTo(x+Math.cos(a)*(r-2),y+Math.sin(a)*(r-2)); ctx.lineTo(x+Math.cos(a)*(r+2.5),y+Math.sin(a)*(r+2.5)); ctx.stroke(); }
    ctx.fillStyle="#2b2b2b"; ctx.beginPath(); ctx.arc(x,y,r*0.68,0,7); ctx.fill();
    ctx.strokeStyle="#d8b24a"; ctx.lineWidth=2.4; ctx.beginPath(); ctx.arc(x,y,r*0.66,0,7); ctx.stroke();
    ctx.strokeStyle="#cfcfcf"; ctx.lineWidth=1.3;
    for(var s=0;s<7;s++){ var b=s/7*6.283+wheelSpin; ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+Math.cos(b)*r*0.62,y+Math.sin(b)*r*0.62); ctx.stroke(); }
    ctx.fillStyle="#777"; ctx.beginPath(); ctx.arc(x,y,r*0.18,0,7); ctx.fill();
  }

  // ---------- Moto de cross (origen cx, suelo gp) ----------
  function drawBike(cx, gp, color, dark){
    var r=19, rearX=cx-33, frontX=cx+34, wy=gp-r;
    // swingarm
    ctx.strokeStyle="#333"; ctx.lineWidth=6; ctx.lineCap="round";
    ctx.beginPath(); ctx.moveTo(rearX,wy); ctx.lineTo(cx-2,gp-30); ctx.stroke();
    // forks (2 tubos)
    ctx.strokeStyle="#9aa0a6"; ctx.lineWidth=5;
    ctx.beginPath(); ctx.moveTo(frontX,wy); ctx.lineTo(cx+15,gp-56); ctx.stroke();
    ctx.strokeStyle="#5a5f63"; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(frontX-2,wy-4); ctx.lineTo(cx+13,gp-40); ctx.stroke();
    // ruedas
    drawKnobWheel(rearX,wy,r); drawKnobWheel(frontX,wy,r);
    // motor
    ctx.fillStyle="#2f2f2f"; ctx.roundRect(cx-16,gp-40,30,20,5); ctx.fill();
    ctx.fillStyle="#484848"; ctx.roundRect(cx-13,gp-38,10,14,2); ctx.fill();
    // escape
    ctx.strokeStyle="#b8b8b8"; ctx.lineWidth=5; ctx.lineCap="round";
    ctx.beginPath(); ctx.moveTo(cx+6,gp-34); ctx.quadraticCurveTo(cx-24,gp-30,rearX-6,gp-22); ctx.stroke();
    // guardabarro trasero (color)
    ctx.fillStyle=color; ctx.beginPath(); ctx.moveTo(cx-14,gp-46); ctx.lineTo(rearX-8,gp-40); ctx.lineTo(rearX-8,gp-33); ctx.lineTo(cx-14,gp-40); ctx.closePath(); ctx.fill();
    // panel numero lateral (color)
    ctx.fillStyle=color; ctx.beginPath(); ctx.moveTo(cx-16,gp-46); ctx.lineTo(cx-2,gp-48); ctx.lineTo(cx-4,gp-32); ctx.lineTo(cx-18,gp-34); ctx.closePath(); ctx.fill();
    ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(cx-10,gp-40,4.5,0,7); ctx.fill();
    // estanque (color) + brillo

  function frame(ts){

    try {

        drawWorld();

        for(var w=0;w<waypoints.length;w++) drawWaypoint(waypoints[w]);
        for(var o=0;o<obstacles.length;o++) drawObstacle(obstacles[o]);
        drawParticles();

        drawHUD();

          ctx.font="bold "+Math.min(36,W*0.052)+"px -apple-system,sans-serif"; ctx.strokeText("Iban tan lento…",W/2,H*0.4); ctx.fillStyle="#ffd54a"; ctx.fillText("Iban tan lento…",W/2,H*0.4);
          ctx.font="bold "+Math.min(30,W*0.044)+"px -apple-system,sans-serif"; ctx.strokeText("que se hizo de noche 🌙",W/2,H*0.56); ctx.fillStyle="#cfe0ff"; ctx.fillText("que se hizo de noche 🌙",W/2,H*0.56); ctx.restore(); }
      }
      ctx.restore();
      if (flash>0){ ctx.save(); ctx.globalAlpha=flash*0.6; ctx.fillStyle="#ff2b2b"; ctx.fillRect(0,0,W,H); ctx.restore(); }
    } catch(e){}
  }
  requestAnimationFrame(frame);

})();
</script>
